#
#  This file contains sample policy control statements for the Policy Agent
#  which verifies and installs them down to the appropriate MVS
#  TCP/IP stack.  The search order used by the Policy Agent to locate
#  the initial configuration file is (highest priority listed first):
#
#  1) ZFS file or MVS data set specified by the -c startup option.  The
#     syntax for a ZFS file is '/dir/file' and the syntax for an MVS
#     data set is "//'MVS.DATASET.NAME'".
#  2) ZFS file or MVS data set specified with the PAGENT_CONFIG_FILE
#     environment variable.
#  3) /etc/pagent.conf
#
#
#  The following are general rules to be followed when defining policies:
#
#  - Specify Policy Agent configuration files using code page IBM-1047
#    for EBCDIC, unless the Codepage statement is configured.
#  - Only one attribute and its values can be specified per line.
#  - Text beyond the specified attribute and value is ignored.
#  - Text beginning with the # character is a comment and is ignored,
#    unless documented otherwise.
#  - Comments beginning with the # character in an LDAP server ldif
#    configuration file might only be recognized as comments at the
#    beginning of the file; therefore do not specify such comments
#    elsewhere in the file, as they are interpreted as part of an
#    attribute or attribute value.
#  - For most range specifications, the ranges can be delimited by a
#    colon (:), a dash (-), or a blank ( ), but these delimiters cannot
#    be mixed within a single range specification.  IP address ranges
#    cannot use the colon or blank delimiter, unless stated otherwise.
#  - IPv6 policy is installed but is not enforceable in a stack that
#    is not IPv6 enabled.
#  - IPv4-mapped IPv6 addresses and IPv6 addresses with the reserved prefix
#    ::/96 are valid only for IP filter rules and for the Identity parameter
#    on local and remote security end points.
#  - The maximum decimal value for numeric values is 4294967295, unless
#    otherwise noted.
#  - Policy rule and action names are limited to 32 characters.  If QoS
#    and IDS LDAP statement names longer than 32 characters are specified,
#    they are silently truncated.  All other statements longer than 32
#    characters cause an error message to be written to the log.
#  - If a configuration file or LDAP configuration contains duplicate
#    statement or object names, Policy Agent keeps the first or the last
#    statement or object, as follows. The following are considered warnings,
#    not errors.
#    - For IDS (LDAP) and QoS, Policy Agent keeps the first entry.
#    - For IDS (configuration file), IPSec, Routing, AT-TLS and ZERT Policy
#      Agent keeps the last entry.
#  - If a QoS or IDS statement or object is defined with the same name
#    in both a configuration file and LDAP, Policy Agent keeps the first
#    such statement or object that it reads. This is typically the statement
#    or object in the configuration file, but as a result of timing
#    constraints, it could also be the statement in LDAP. The last duplicate
#    statement or object is discarded; this is considered an error.
#  - Specify most attributes for configuration file statements only once
#    per statement (exceptions are noted where appropriate). If you specify
#    multiple attributes, no error or warning messages are written to the
#    log, and the last instance of the attribute is used.
#  - Attributes for policies defined on an LDAP server can be single- or
#    multi-valued (meaning a single value or multiple values are allowed
#    for that attribute).  The Policy Agent detects multiple values for
#    attributes that are defined as single valued, and treats the policy
#    object as in error.
#  - The policy version is specified by the configuration file statement
#    name as follows:
#    - ServicePolicyRules and ServiceCategories statementsspecify version 1
#      policies.
#    - PolicyRule and PolicyAction statements specify version 2 policies.
#      Result: The policy version of LDAP-defined objects is determined
#      by the LDAP_SchemaVersion parameter on the ReadFromDirectory statement.
#    For more information about policy version definitions, see z/OS
#    Communications Server: IP Configuration Guide. For more information
#    about policy version differences, see z/OS Communications Server: IP
#    Diagnosis Guide.
#  - Some configuration statements use an inline statement syntax. When a
#    given statement is specified inline within another statement, only the
#    inline statement name is shown in the syntax diagrams. However, the
#    entire statement being inlined must be specified, including its own set
#    of start and end braces ({}) and all parameters.
#    Tip: The name parameter on the statement name might or might not be
#    optional, depending on the specific statement. In the following example,
#    the IpFilterRule statement is included inline within the IpFilterGroup
#    statement. A name is required on the IpFilterRule statement, for example,
#    Rule1All-Permit, as follows:
#    IpFilterGroup ZoneAll
#    {
#      IpFilterRule Rule1All-Permit
#      {
#        IpSourceAddr All
#        IpDestAddr All
#        IpServiceGroupRef Resolver
#        IpServiceRef PathMtuDiscovery
#        IpServiceGroupRef Ping-Outbound-Only
#        IpGenericFilterActionRef permit
#      }
#    }
#  - For named inline statements where the name is optional, a nonpersistent
#    system name is created using the named portion of the statement name
#    with a unique identifier. This prevents reuse of the named inline
#    statement as a reference name.
#  - Errors detected in a policy rule or action result in that policy
#    object being discarded.
#  - For IPSec, Routing, AT-TLS or ZERT policies, any errors detected during
#    parsing results in no new policies being installed. For all other
#    policy types, only the policy objects that contain errors are
#    discarded.
#  - If a rule refers to an action that does not exist (or has been discarded
#    due to an error) then the rule is also discarded.
#  - If a Routing action refers to a route table that does not exist
#    (or has been discarded due to an error), the action is also
#    discarded.
#
#  The following conventions are used in this configuration file:
#         p  : choose one in the allowed parameter set
#         p+ : choose one or more in the allowed parameter set
#         B  : integer value of a byte (i.e., 0 =< B =< 255)
#         b  : bit string starting with left most bit (e.g., 101 is
#              equivalent 10100000 in a byte field)
#         i  : integer value
#         s  : a character string
#         a  : IPv4 address in dotted-decimal format or
#              IPv6 address in colon-hex format
#         l  : a distinguished name in directory format k=s,k=s...,
#              where k & s are strings
#        (R) : Required parameter
#        (C) : Conditionally required parameter (required if ...)
#        (O) : Optional parameter

# Codepage Statement
#   Use the Codepage statement to specify the EBCDIC code page to be
#   used for reading all configuration files and policy definition files.
#   The default is IBM-1047. All statements read from the files are
#   converted to the IBM-1047 code page from the specified code page.
#
#   Result: If you specify a code page that is not one of the supported values,
#   then Policy Agent issues a warning message to the log file and tries
#   to read the configuration files using the IBM-1047 code page.  It is
#   possible that configuration errors will be detected in this case.
#
#   statement format:
#         Codepage                                 s  # Code page value.
#   where:
#         s                                     (R):  One of the supported code
#                                                     page values:
#                                                       IBM-037
#                                                       IBM-273
#                                                       IBM-274
#                                                       IBM-275
#                                                       IBM-277
#                                                       IBM-278
#                                                       IBM-280
#                                                       IBM-281
#                                                       IBM-282
#                                                       IBM-284
#                                                       IBM-285
#                                                       IBM-297
#                                                       IBM-500
#                                                       IBM-871
#                                                       IBM-1047
#                                                       IBM-1140
#                                                       IBM-1141
#                                                       IBM-1142
#                                                       IBM-1143
#                                                       IBM-1144
#                                                       IBM-1145
#                                                       IBM-1146
#                                                       IBM-1147
#                                                       IBM-1148
#                                                       IBM-1149
#
#   example:  Codepage IBM-1141
LogLevel 31
# LogLevel Statement
LogLevel 31
#   This statement specifies what type of log messages should be logged
#   into the Policy Agent log file.  The default is log level 31.  If
#   upon invocation of Pagent, the debug (-d) option is specified with
#   debug level 1, all log messages are logged.
#
#   statement format:
#         LogLevel                                 i  # Logging level.
#   where:
#         i                                     (R):  The sum of the following values that
#                                                      represent log levels:
#                                                      LOGL_SYSERR     1
#                                                      LOGL_OBJERR     2
#                                                      LOGL_PROTERR    4
#                                                      LOGL_WARNING    8
#                                                      LOGL_EVENT     16
#                                                      LOGL_ACTION    32
#                                                      LOGL_INFO      64
#                                                      LOGL_ACNTING  128
#                                                      LOGL_TRACE    256
#
#   example:  LogLevel 15     specifies four error types to be logged:
#                                syserr, objerr, proterr, and warning.

# TcpImage and PEPInstance Statements (synonyms)
#   This statement specifies an MVS TCP/IP image/stack and its associated
#   policy control file to be installed to that image.  If policy control
#   file is not specified, following control statements (if any) in this
#   file will be installed to that image.  If no TcpImage statement is
#   specified, all policies will be installed to the default TCP/IP image.
#   Parameter FLUSH or NOFLUSH (default) can be used to force flushing
#   (deletion) of all existing policy control data in the stack on
#   startup or when the configuration files change.  The PURGE or NOPURGE
#   parameter controls whether or not policies are deleted from the stack
#   when Pagent is shut down. For details on the FLUSH and PURGE parameters,
#   see the FLUSH and PURGE considerations in the z/OS Communications Server:
#   IP Configuration Guide. The time interval for checking for new,
#   changed, or deleted policies can be specified.  The default is 1800
#   seconds (30 minutes).
#
#   statement format:
#         TcpImage | PEPInstance     s1   s2   p   p   i  # TCP/IP image specification.
#   where:
#         s1                                    (R):  (8 characters) is the name of the MVS
#                                                      TCP/IP image.
#         s2                                    (O):  Is the path of the Image policy control file.
#                                                     If not specified, then this file is used
#                                                     as both main and image file.
#         p                                     (O):  FLUSH | NOFLUSH, default is NOFLUSH.
#         p                                     (O):  PURGE | NOPURGE, default is NOPURGE.
#         i                                     (O):  File/LDAP modification check interval in
#                                                      seconds.  Default is 1800 (30 minutes).
#                                                      To avoid timer-based detection of
#                                                      policy updates, use a very large interval
#                                                      value. Maximum is 2147483647.
#
#   examples:
#      TcpImage TCPCS FLUSH NOPURGE 2000000000
#           Single main and image policy file that contains common and stack specific statements.
#      TcpImage TCPCS /tmp/TCPCS.policy  FLUSH NOPURGE 2000000000
#           Main file that contains common statement
#           Image file (/tmp/TCPCS.policy) that contains stack specific
#           policy statements.
#      TcpImage TCPCS //'USER1.PAGENT.CONF(TCPCS)' FLUSH NOPURGE 2000000000
#           Main file that contains common statement
#           Image file (USER1.PAGENT.CONF(TCPCS)) that contains stack specific
#           policy statements.      #

# AutoMonitorApps Statement
#
#   You can configure the Policy Agent to monitor and automatically start
#   or restart a set of related applications.  The following set of applications
#   can be monitored:
#
#   - Defense Manager daemon (DMD)
#   - IKE daemon (IKED)
#   - Network Security Server daemon (NSSD)
#   - Syslog daemon (SYSLOGD)
#   - Traffic Regulation Manager daemon (TRMD)
#
#   Use the AutoMonitorParms statement to configure global parameters that
#   control how the Policy Agent monitors and starts or restarts these applications.
#
#   Use the AutoMonitorApps statement to configure what applications should
#   be monitored, and to specify application-specific parameters.
#
#   Results:
#   - If you configure applications to be automatically started and restarted,
#     be aware of the following:
#     - If you start the Policy Agent after you've already started an application
#       to be monitored, Policy Agent starts monitoring the application if it was
#       originally started with the same job name that is configured to the Policy Agent.
#       If the application needs to be restarted later, it is restarted using the
#       cataloged procedure configured to the Policy Agent.  This might not be the
#       same procedure that was originally used to start the application.
#     - If you start the Policy Agent after you've already started an application
#       to be monitored, but the application does not use the same job name that
#       is configured to the Policy Agent, then the Policy Agent is not able to
#       detect that the application is active.  Policy Agent tries to start another
#       instance of the application, and this start will likely fail.
#
#     Tip: If you configure applications to be monitored by the Policy Agent, ensure
#     those applications are not running before starting the Policy Agent.
#     However, you might need to start syslogd before starting the Policy Agent.
#     If you start syslogd before starting the Policy Agent, ensure that Policy
#     Agent is configured with the correct syslogd job name.
#
#   - If this statement is removed, or one or more AppName parameters, or instances
#     of the TcpImageName parameter are removed, Policy Agent stops monitoring the
#     affected applications.  You must stop or restart the applications if needed.
#
#   - If one or more AppName parameters, or instances of the TcpImageName parameter
#     are added, Policy Agent starts the affected applications and begins monitoring them.
#
#   - If any of the parameters other than AppName or TcpImageName are added, removed,
#     or changed, Policy Agent stops and restarts the affected applications.
#
#   statement format for applications without stack affinity:
#         AutoMonitorApps
#         {
#           AppName                                p  # Application name
#           {
#             ProcName                             s  # Cataloged procedure
#             Jobname                              s  # Job name
#             StartParms                           s  # Start options
#             EnvVar                               s  # Environment variable
#           }
#         }
#
#   statement format for applications with stack affinity:
#         AutoMonitorApps
#         {
#           AppName                                p  # Application name
#           {
#             TcpImageName                         s  # TCP/IP stack name
#             {
#               ProcName                           s  # Cataloged procedure
#               Jobname                            s  # Job name
#               StartParms                         s  # Start options
#               EnvVar                             s  # Environment variable
#             }
#           }
#         }
#
#   where:
#         AppName                               (O):  Specifies what applications
#                                                     you want to monitor and automatically
#                                                     start and restart.  Repeat this
#                                                     parameter for each application.
#                                                     The following applications are
#                                                     supported:
#                                                     - Defense Manager daemon (DMD)
#                                                     - IKE daemon (IKED)
#                                                     - Network security services daemon (NSSD)
#                                                     - Syslog daemon (SYSLOGD)
#                                                     - Traffic Regulation Manager daemon (TRMD)
#
#         TcpImageName                          (O):  A string 1 - 8 characters in length
#                                                     that specifies the TCP/IP images on which
#                                                     the application runs.  Repeat this
#                                                     parameter for each image.
#
#                                                     Rules:
#                                                     - This parameter is required and valid
#                                                       only for applications that run a
#                                                       separate instance for each TCP/IP image.
#                                                       Currently, the only application that does
#                                                       this is TRMD.
#                                                     - You can specify a maximum of 8 unique
#                                                       TcpImageName parameters for a given
#                                                       AppName parameter.
#                                                     - You must configure the specified TCP/IP
#                                                       image on a TcpImage statement.
#
#                                                     Results:
#                                                     - In an single stack (INET) environment,
#                                                       the application runs on the active TCP/IP
#                                                       image.
#                                                     - In a common INET (CINET) environment, if
#                                                       you do not specify the TCP/IP image name,
#                                                       the application runs on the default TCP/IP
#                                                       image (resolver-supplied TCP/IP user ID or
#                                                       TCP/IP job name).  If the default TCP/IP
#                                                       image cannot be determined, the Policy Agent
#                                                       uses the name INET.
#                                                     - If the TcpImage statement for the specified
#                                                       TcpImageName is removed, Policy Agent stops
#                                                       monitoring the application for that TCP/IP
#                                                       image.
#
#         ProcName                              (R):  A string 1 - 8 characters in length that
#                                                     specifies the name of a cataloged procedure
#                                                     that is used to start the application.  A
#                                                     sample procedure is included in
#                                                     SEZAINST(EZAPOLPR).
#
#                                                     Tip: You can use a single generic cataloged
#                                                     procedure for all configured applications.
#                                                     Parameters are passed to the start procedure
#                                                     to identify the application name and
#                                                     application-specific parameters.  If you
#                                                     use a single procedure then all started
#                                                     applications will run under the same user
#                                                     ID.  If you want to use different user IDs
#                                                     for each application, specify different
#                                                     procedure names for the applications using
#                                                     this parameter.
#
#                                                     Rule: The specified procedure must contain the
#                                                     following JCL parameters:
#
#                                                     Variable  Description          Value Passed
#                                                     --------  -------------------  ---------------------
#                                                     PROG      Specifies the name   One of the following
#                                                               of the application   supported application
#                                                               program executable.  names:
#                                                                                    - DMD
#                                                                                    - IKED
#                                                                                    - NSSD
#                                                                                    - SYSLOGD
#                                                                                    - TRMD
#
#                                                     VARS      Specifies the name   Temporary file name
#                                                               of a temporary file  generated by the Policy
#                                                               containing           Agent.
#                                                               environment
#                                                               variables for the
#                                                               application.
#
#                                                     PARMS     Specifies start      The string specified
#                                                               parameters for the   on the StartParms
#                                                               application.         parameter on the
#                                                                                    AutoMonitorApps
#                                                                                    statement, or a null
#                                                                                    string.
#
#         Jobname                               (O):  A string 1 - 8 characters in length
#                                                     that specifies the run-time job name
#                                                     for the application.
#
#                                                     Rules:
#                                                     - For applications that do not use the
#                                                       TcpImageName parameter, this parameter
#                                                       is optional.  The default is the value
#                                                       specified with the AppName parameter.
#                                                     - For applications that use the TcpImageName
#                                                       parameter, this parameter is required so
#                                                       that the job name for each instance is unique.
#
#         StartParms                            (O):  A string 1 - 45 characters in length that
#                                                     specifies the start parameters for the application.
#                                                     Specify the parameters as you would on the PARM
#                                                     parameter on the EXEC JCL statement, but without
#                                                     using single quotes.  For example:
#
#                                                       StartParms   -d 1
#
#         EnvVar                                (O):  A string 1 - 1024 characters in length that
#                                                     specifies environment variables for the application.
#                                                     Repeat this parameter for each environment variable.
#                                                     Specify the environment variable name and the value,
#                                                     separated by an equal sign.  Here are some examples
#                                                     of how this parameter can be used:
#
#                                                     - To specify the configuration file for IKED,
#                                                       code the following:
#                                                         EnvVar   IKED_FILE=/etc/iked.conf
#                                                     - To specify the resolver configuration file
#                                                       for TRMD, code the following:
#                                                         EnvVar   RESOLVER_CONFIG=//'SYS1.TCPPARMS(TCPDATA2)'
#                                                     - To specify the time zone for NSSD, code
#                                                       the following:
#                                                         EnvVar   TZ=EST5EDT
#
#   example:
#   This example shows how to specify parameters for the following types of
#   applications:
#   - An application without stack affinity, which means that a single copy of the
#     application runs regardless of how many TCP/IP stacks are running.
#     This example uses the IKED as such an application.
#   - An application with stack affinity, which means that one instance of the
#     application runs on each TCP/IP stack. This example uses TRMD as such an
#     application.
#
#     AutoMonitorApps
#     {
#       AppName           IKED
#       {
#         Procname        POLPROC
#       }
#       AppName           TRMD
#       {
#         TcpImageName    TCPIP1
#         {
#           Procname      POLPROC
#           Jobname       TRMD1
#         }
#         TcpImageName    TCPIP3
#         {
#           Procname      POLPROC
#           Jobname       TRMD3
#         }
#       }
#     }

# AutoMonitorParms Statement
#   Use the AutoMonitorParms statement to configure the Policy Agent to monitor and
#   automatically start or restart a set of related applications. The following set
#   of applications can be monitored:
#
#   - Defense Manager daemon (DMD)
#   - IKE daemon (IKED)
#   - Network Security Server daemon (NSSD)
#   - Syslog daemon (SYSLOGD)
#   - Traffic Regulation Manager daemon (TRMD)
#
#   Use the AutoMonitorApps statement to configure what applications should be
#   monitored, and to specify application-specific parameters.
#
#   Use the AutoMonitorParms statement to configure global parameters that control
#   how the Policy Agent monitors and starts or restarts the configured applications.
#   If the default values for all parameters are acceptable, you do not need to use
#   this statement.
#
#   Results:
#   - If this statement is removed, the default values are applied when the previously
#     specified MonitorInterval value expires.
#   - If this statement is added, the new values are applied when the previous
#     default MonitorInterval expires.
#   - If any changes are made to this statement, the new values are applied when
#     the previously specified MonitorInterval value expires.
#
#   statement format:
#         AutoMonitorParms
#         {
#           MonitorInterval                        i  # Monitor interval
#           RetryLimitCount                        i  # Retry limit count
#           RetryLimitPeriod                       i  # Retry limit period
#         }
#   where:
#         MonitorInterval                       (O):  Specifies the interval, in seconds,
#                                                     at which an application should be
#                                                     monitored if that application is
#                                                     still running.  Valid values are in
#                                                     the range 1 - 86400.  The default
#                                                     is 10 seconds.
#
#         RetryLimitCount                       (O):  Specifies the number of times
#                                                     Policy Agent should start or restart
#                                                     an application within the time period
#                                                     specified by the RetryLimitPeriod
#                                                     parameter.  Valid values are in the
#                                                     range 1 - 99.  The default is 5.
#
#                                                     Each time an application is started,
#                                                     Policy Agent waits 1 minute for the
#                                                     application to start.  If it does not
#                                                     start, Policy Agent tries to start it
#                                                     again until the limit specified with
#                                                     this parameter is reached.  If the
#                                                     application still has not started,
#                                                     Policy Agent stops monitoring the
#                                                     application until a MODIFY MON,START
#                                                     command is issued for the application.
#                                                     For example, if the application is IKED,
#                                                     the MODIFY procname,MON,START,IKED
#                                                     command causes Policy Agent to resume
#                                                     trying to start the application.  See
#                                                     the MODIFY Policy Agent topic in IP
#                                                     System Administrator's Commands for
#                                                     information about using MODIFY commands
#                                                     to manage the monitored applications.
#
#         RetryLimitPeriod                      (O):  Specifies the time interval, in seconds,
#                                                     at which Policy Agent should try to
#                                                     start or restart an application.  See
#                                                     the RetryLimitCount parameter for more
#                                                     details.  Valid values are in the range
#                                                     1 - 86400.  The default is 600 (10 minutes).
#
#   example:
#     AutoMonitorParms
#     {
#       MonitorInterval    10
#       RetryLimitCount    5
#       RetryLimitPeriod   600
#     }

# ClientConnection Statement
#   The Policy Agent acting as a policy server uses the ClientConnection
#   statement to specify the listening port.  The Policy Agent acting as a
#   policy client uses this connection to retrieve remote policies.
#
#   An error is flagged if both the ClientConnection and ServerConnection
#   statements are configured on the same Policy Agent. The result is that
#   there is no connection between the policy server and policy client.
#
#   If the ClientConnection statement is removed, all connections to policy
#   clients are disconnected.
#
#   Updates to the ClientConnection statement are used only for new client
#   connections to the policy server.
#
#   statement format:
#         ClientConnection                         i  # Listening port
#   where:
#         i                                     (O):  Specifies the port that the policy
#                                                     server listens on for TCP connections
#                                                     from policy clients. This port must
#                                                     be the same as the ServerPort value
#                                                     specified on the ServerConnection
#                                                     statement for any policy clients that
#                                                     connect to this policy server.
#
#                                                     The valid port values are in the range
#                                                     1 - 65535. The default port value is
#                                                     16310.
#
#                                                     If the port value is updated, then the
#                                                     policy server listens for TCP connections
#                                                     using the updated value.
#
#                                                     The port value cannot match the port
#                                                     value configured on the ServicesConnection
#                                                     statement.
#
#   example:
#     ClientConnection 16310

# DynamicConfigPolicyLoad Statement
#   The Policy Agent acting as a policy server uses the DynamicConfigPolicyLoad
#   statement to obtain the file names of the configuration files to be retrieved by
#   policy clients.
#
#   The DynamicConfigPolicyLoad statement can appear only in the main configuration file.
#
#   For each policy type the policy client files are read only after the policy
#   client connects to the policy server.  A DynamicConfigPolicyLoad statement (or default
#   values) is bound to a policy client for the life of that client, until one of the following
#   occurs:
#
#   - The policy client disconnects from the policy server.
#   - The connection between the policy server and the policy client ends.
#   - The associated DynamicConfigPolicyLoad statement is removed.
#
#   When a DynamicConfigPolicyLoad statement is removed, the policy clients that
#   were using that statement change to use another statement, or default values.
#
#   The policy client policies are removed from the policy server in the following cases:
#
#   - The policy client disconnects from the policy server.
#   - The connection between the policy server and the policy client ends.
#   - The policy client requests that remote policies for a specific policy type be unloaded
#     from the policy server.
#   - The associated DynamicConfigPolicyLoad statement is removed.
#
#   To retrieve remote policies with the policy client, you must define security product
#   authority in the SERVAUTH class for the policy client's user ID; the user ID is defined
#   on the Userid parameter on the PolicyServer statement. The ClientName parameter on the
#   PolicyServer statement is used as the image name. For more information, see the general
#   policy agent configuration information in z/OS Communications Server: IP Configuration
#   Guide. Wildcard values are allowed in profile names. The following example shows the
#   structure of the security product profile:
#   EZB.PAGENT.sysname.image.ptype
#
#   Multiple DynamicConfigPolicyLoad statements can appear in the main configuration
#   file.  The policy server maintains a list of these DynamicConfigPolicyLoad
#   statements.  When a policy client connects to the policy server, then the policy
#   client name configured on the PolicyServer statement is matched to the clientname
#   parameter.  The names are case-sensitive with regard to matching.  This clientname
#   parameter can be a regular expression. The policy server matches these names in the
#   following order:
#   1. A clientname parameter that has an exact match to the policy client name. The policy
#      client name must not contain any regular expression characters.
#   2. A regular expression clientname parameter that matches the policy client name. The
#      longest matching regular expression is chosen. If multiple statements match with the
#      same length clientname parameter, the statement chosen is based on alphabetical order.
#   3. If there is no matching clientname parameter or a matching clientname value does not
#      have a corresponding PolicyType parameter for this policy type, then the following
#      default remote files are used:
#      - Stack-specific remote files used for each policy type:
#        - IDS - /etc/pagent_remote.ids
#        - IPSec - /etc/pagent_remote.ipsec
#        - QoS - /etc/pagent_remote.qos
#        - Routing - /etc/pagent_remote.routing
#        - AT-TLS - /etc/pagent_remote.ttls
#        - ZERT - /etc/pagent_remote.zert
#      - For any default stack-specific remote file used, there is no corresponding common
#        configuration file.
#      - If no matching clientname parameter is found, then the refresh interval is set to
#        30 minutes.
#
#   The PolicyLoad and CommonPolicyLoad parameters are optional; however, if neither the
#   PolicyLoad parameter or the CommonPolicyLoad parameters are configured, this
#   DynamicConfigPolicyLoad statement results in an error and the statement is discarded.
#
#   statement format:
#         DynamicConfigPolicyLoad                  s  # Client name
#         {
#            PolicyType                            p  # Policy type
#            {
#               CommonPolicyLoad                   s  # Common file name
#               PolicyLoad                         s  # Image file name
#            }
#            RefreshInterval                       i  # Refresh interval
#         }
#
#   where:
#         s                                     (R):  A string 1-511 characters in length
#                                                     specifying the client name to be
#                                                     matched to the policy client name.
#
#                                                     If this is a regular expression, the
#                                                     string must consist of 1 - 511 characters.
#                                                     Otherwise, it must consist of 1-24
#                                                     characters.
#
#                                                     This clientname parameter is used
#                                                     to match the policy client name
#                                                     when it connects to Policy Agent
#                                                     to derive its policy files.
#
#                                                     The clientname parameter can also consist
#                                                     of a regular expression. The simplest form
#                                                     of regular expression is a string of
#                                                     characters without a special meaning. Such
#                                                     a string matches only itself.  See z/OS
#                                                     Communications Server: IP Configuration
#                                                     Reference for the allowable regular
#                                                     expression characters and their usage.
#
#         PolicyType                            (O):  Indicates additional policy configuration
#                                                     information for a specific policy type.
#                                                     Multiple types can be specified.  Valid policy
#                                                     types are:
#                                                     - IDS
#                                                     - IPSec
#                                                     - QoS
#                                                     - Routing
#                                                     - TTLS
#                                                     - ZERT
#
#         CommonPolicyLoad                      (C):  The path of the common remote policy
#                                                     file to be used for the defined
#                                                     policy type.
#
#                                                     The CommonPolicyLoad parameter is
#                                                     not supported for PolicyType QoS and ZERT.
#
#                                                     One or both of the CommonPolicyLoad
#                                                     or PolicyLoad parameters must be
#                                                     specified.
#
#         PolicyLoad                            (C):  The path of the stack-specific remote
#                                                     policy file to be used for the
#                                                     defined policy type.
#
#                                                     If the PolicyLoad parameter is not
#                                                     specified, then the associated
#                                                     common remote policy file specified
#                                                     on the CommonPolicyLoad parameter
#                                                     is used.
#
#                                                     The path name can contain a single
#                                                     wildcard character (*). The policy
#                                                     client name replaces the wildcard
#                                                     position to obtain the stack-specific
#                                                     remote policy file.
#
#                                                     One or both of the CommonPolicyLoad
#                                                     or PolicyLoad parameters must be
#                                                     specified.
#
#         RefreshInterval                       (O):  Specifies the time interval (in seconds)
#                                                     that lapses between checks for changes
#                                                     to the creation or modification time of
#                                                     the common and stack-specific remote policy
#                                                     files. This attribute applies to all
#                                                     configured policy types. In the following
#                                                     cases, the update interval is changed:
#                                                     - If a value is not specified, the default
#                                                       is 1800 seconds (30 minutes).
#                                                     - If a value of 0 is specified, the default
#                                                       value of 1800 seconds (30 minutes) is used.
#                                                     - Any value from 1 to 299 is rounded up to
#                                                       300 seconds (5 minutes).
#                                                      To avoid timer-based detection of
#                                                      policy updates, use a very large interval
#                                                      value. Maximum is 2 147 483 647.
#
#   example:
#     DynamicConfigPolicyLoad remote*
#     {
#       RefreshInterval     1800
#       PolicyType          IPSec
#       {
#         CommonPolicyLoad  /etc/pagent_remote.ipsec
#       }
#       PolicyType          TTLS
#       {
#         PolicyLoad        /etc/pagent_remote.ttls
#       }
#     }

# PolicyServer Statement
#   The Policy Agent acting as a policy client uses the PolicyServer statement  to
#   determine what type of policies to retrieve from the policy server.  This statement
#   also specifies security information and processing information which is passed to
#   the policy server.
#
#   Connectivity to the policy server is needed for all images that specify the
#   PolicyServer statement.
#
#   The PolicyServer statement can appear only in an image configuration file (unless
#   the main and image configuration files are the same file).
#
#   If a ServerConnection statement is not configured in the main configuration file,
#   then this statement is ignored.
#
#   For a policy type, if remote policies are used, then the local policies of the same
#   type are ignored.
#
#   The policy client disconnects from the policy server when one of the following occurs:
#   - The ServerConnection or PolicyServer statement is removed.  The result is that
#     all remote policies are uninstalled.  If local policies are configured, then they
#     are installed.
#   - The PolicyServer statement is updated and all PolicyType parameters are removed.
#     The result is that the remote policies for the associated TCP/IP stack are uninstalled.
#     If the local policies for the associated TCP/IP stack are configured, they are installed.
#
#   The policy client disconnects from and reconnects to the policy server when one of
#   the following occurs:
#   - The PolicyServer statement is updated and the client name, user identification or
#     authorization parameters have changed.
#   - The connection between the policy server and the policy client ends.
#
#   If a PolicyType parameter is removed, then the remote policies for this policy type
#   are removed for the associated TCP/IP stack.  If the local policies for this policy
#   type are configured, they are installed.
#
#   You must have defined security product authority in the SERVAUTH class for the policy
#   client's user ID. The policy client's client name is used as the image name. For details,
#   see the general policy agent configuration information in z/OS Communications Server: IP
#   Configuration Guide. Wildcard values are allowed in profile names. The following example
#   shows the structure of the security product profile:
#   EZB.PAGENT.sysname.image.ptype
#
#   statement format:
#         PolicyServer
#         {
#            Userid                                s  # User ID
#            AuthBy                              p s  # Authorization type
#            ClientName                            s  # Client name
#            PolicyType                            p  # Policy type
#            {
#               FLUSH | NOFLUSH                    s  # Flush parameter
#               PURGE | NOPURGE                    s  # Purge parameter
#            }
#         }
#
#   where:
#         Userid                                (R):  Specifies the policy client's user
#                                                     identification string.  The policy server
#                                                     uses this parameter to identify which
#                                                     resources the client can access.  The user
#                                                     ID is a string 1 - 8 alphanumeric
#                                                     characters in length. The first character
#                                                     cannot be a number.  No special characters
#                                                     (such as @, $, #, *)  are allowed.
#
#         AuthBy                                (R):  Indicates which method the policy server
#                                                     uses for authentication of the user ID.
#                                                     The options are Password and the more
#                                                     secure PassTicket.
#                                                     - Password <string>
#                                                       This option causes the client to send
#                                                       the configured password to the policy
#                                                       server for authentication. The password
#                                                       is 1 - 8 characters in length.
#                                                     - PassTicket
#                                                       The PassTicket option causes the client
#                                                       to generate a one-time session key. See
#                                                       the information about the secured signon
#                                                       function in z/OS Security Server RACF
#                                                       Security Administrator's Guide.
#
#         ClientName                            (O):  A string 1-24 characters in length that
#                                                     specifies the client name (PEPInstance name)
#                                                     for this policy client.  This client
#                                                     name is used by the policy server to
#                                                     determine which configuration files
#                                                     to use to load the client's policies
#                                                     and whether proper security authorization
#                                                     is configured.  See z/OS Communications
#                                                     Server: IP Configuration Reference
#                                                     DynamicConfigPolicyLoad statement for details
#                                                     about how this name is used to select the remote
#                                                     configuration file names.
#
#                                                     If no client name is configured, then
#                                                     the policy client generates this
#                                                     parameter based on the system's host name
#                                                     and the associated  TcpImage or
#                                                     PEPInstance statement image name.
#                                                     For example, if the system host name is
#                                                     MVSIBM and TcpImage name is TCPCS, then the
#                                                     generated client name is MVSIBM_TCPCS.
#
#         PolicyType                            (O):  Indicates what policy types the policy client
#                                                     retrieves from the policy server.  Multiple
#                                                     types can be specified.  Valid policy types
#                                                     are:
#                                                     - IDS
#                                                     - IPSec
#                                                     - QoS
#                                                     - Routing
#                                                     - TTLS
#                                                     - ZERT
#
#                                                     The additional set of braces are
#                                                     required only if the following
#                                                     parameters are specified.
#
#         FLUSH | NOFLUSH                       (O):  FLUSH or NOFLUSH value.  These
#                                                     parameters are ignored for PolicyType
#                                                     IPSec, Routing and ZERT.
#
#         PURGE | NOPURGE                       (O):  PURGE or NOPURGE value.  These
#                                                     parameters are ignored for PolicyType
#                                                     IPSec, Routing, and ZERT.
#
#   For details on the FLUSH and PURGE parameters, see the FLUSH and PURGE considerations in
#   the z/OS Communications Server: IP Configuration Guide.
#
#   example:
#     PolicyServer
#     {
#        Userid             USER10
#        AuthBy             PassTicket
#        ClientName         remote42
#        PolicyType         IDS
#        {
#           FLUSH
#           NOPURGE
#        }
#        PolicyType         Routing
#     }

# ServerConnection Statement
#   The Policy Agent acting as a policy client uses the ServerConnection statement to
#   connect to the Policy Agent acting as a policy server.   This statement includes
#   security information and the location of the policy server.  The policy client uses
#   this connection to retrieve remote policies.
#
#   An error is flagged if both the ClientConnection and ServerConnection
#   statements are configured on the same Policy Agent.  As a result, there is
#   no connection between the policy server and policy client.
#
#   If a PolicyServer statement is not configured in any image configuration file,
#   this statement is ignored, and no connections to the policy server exist.
#
#   If any parameters on the ServerConnection statement are updated after a remote
#   connection is established, the changed values take effect for new connections.
#   The ServerConnectWait and ServerConnectRetries parameters take effect immediately
#   for any connections that require retry processing.
#
#   If the ServerConnection statement is deleted, all established remote connections
#   are stopped.  As a result, all remote policies are uninstalled.  If configured,
#   then the local policies are now installed.
#
#   statement format:
#         ServerConnection
#         {
#            ServerHost                          a|s  # Primary host
#            ServerPort                            i  # Primary port
#            ServerHostBackup                    a|s  # Backup host
#            ServerPortBackup                      i  # Backup port
#            ServerConnectWait                     i  # Connect wait
#            ServerConnectRetries                  i  # Connect retry
#            ServerSSL
#            {
#               ServerSSLKeyring                   s  # Keyring name
#               ServerSSLKeyringPassword           s  # Keyring password
#               ServerSSLKeyringStashFile          s  # Keyring stash file name
#               ServerSSLName                      s  # Label name
#               ServerSSLV3CipherSuites            s  # Cipher suites
#               ServerSSLV3CipherSuites4Char       s  # 4-char cipher suites
#               ServerSSLv3                        s  # SSLv3
#               ServerTLSv1.3                      s  # TLSv1.3
#            }
#         }
#
#   where:
#         ServerHost                            (R):  A string 1 - 512 characters in length
#                                                     that specifies the name of the primary
#                                                     policy server host that contains
#                                                     policy definitions.  Specify the name
#                                                     as a hostname (for example,
#                                                     policyserver.mynetwork.com) or as
#                                                     an IP address (for example, 9.11.12.13).
#                                                     The IP address can be either IPv4 or
#                                                     IPv6.
#
#         ServerPort                            (O):  The policy server listening port number.
#                                                     The policy client connects using this port
#                                                     number.  The valid port values are in the
#                                                     range 1 - 65535.  The default is 16310.
#
#         ServerHostBackup                      (O):  A string 1 - 512 characters in length
#                                                     specifying the name of the backup
#                                                     policy server that contains policy
#                                                     definitions.  The name can be specified
#                                                     as a hostname (for example,
#                                                     policyserver.mynetwork.com) or as
#                                                     an IP address (for example, 9.11.12.13).
#                                                     The IP address can be either IPv4 or
#                                                     IPv6.  The default is no backup server.
#
#         ServerPortBackup                      (O):  The backup policy server
#                                                     listening port number.  The policy
#                                                     client connects using this port
#                                                     number.  The valid port values are in the
#                                                     range 1 - 65535. The default is 16310.
#                                                     This parameter is ignored if the
#                                                     ServerHostBackup parameter is not specified.
#
#         ServerConnectWait                     (O):  Specifies the number of seconds (1-300)
#                                                     that the policy client waits between
#                                                     connection attempts when trying to
#                                                     establish a connection with a policy
#                                                     server.  The default value is 60 seconds.
#
#                                                     The product of the ServerConnectWait value
#                                                     multiplied by the ServerConnectRetries value
#                                                     defines the maximum number of seconds that
#                                                     the policy client attempts to connect with a
#                                                     policy server before switching to another
#                                                     policy server (if a backup server is configured).
#                                                     For example, if the ServerConnectWait value is
#                                                     60 and the ServerConnectRetries value is 3, then
#                                                     the policy client waits a maximum of 180 seconds
#                                                     for a successful connection.
#
#         ServerConnectRetries                  (O):  Specifies the number of times (1-10) that
#                                                     the policy client attempts to establish a
#                                                     connection with a policy server.  The default
#                                                     value is 3 retries.
#
#                                                     The product of the ServerConnectWait value
#                                                     multiplied by the ServerConnectRetries value
#                                                     defines the maximum number of seconds that
#                                                     the policy client attempts to connect with a
#                                                     policy server before switching to another
#                                                     policy server (if a backup server is configured).
#                                                     For example, if the ServerConnectWait value is
#                                                     60 and the ServerConnectRetries value is 3, then
#                                                     the policy client waits a maximum of 180 seconds
#                                                     for a successful connection.
#
#         ServerSSL                             (O):  Indicates that additional SSL parameters follow.
#
#                                                     This parameter is optional.  If you want to use a
#                                                     secure connection to the policy server, specify
#                                                     this parameter and other SSL parameters as needed.
#
#                                                     If ServerSSL is specified, TLSv1, TLSv1.1 and TLSv1.2
#                                                     are enabled. You can choose whether to enable SSLv3
#                                                     with the ServerSSLv3 parameter. It should only be
#                                                     enabled if the policy server is unable to support a
#                                                     later TLS version.
#                                                     You can choose whether to enable TLSv1.3 with the
#                                                     ServerTLSv1.3 parameter. If it is enabled, the supported
#                                                     ciphers must be explicitly configured also.
#
#         ServerSSLKeyring                      (O):  A string 1 - 1023 characters in length
#                                                     specifying the name of the key ring file created
#                                                     by gskkyman, or the ring name of the SAF key ring.
#                                                     This key ring usually contains the certificates
#                                                     of the trusted (by the client) Certificate
#                                                     Authorities. The key ring can also contain a
#                                                     public key and the associated certificate (this
#                                                     is needed only when client authentication is
#                                                     required).
#
#                                                     This parameter is required if ServerSSL is
#                                                     specified.
#
#         ServerSSLKeyringPassword              (O):  A string 1 - 128 characters in length that
#                                                     specifies the password for the key database that
#                                                     protects the key ring file. It is set when the
#                                                     key ring file is created with the gskkyman tool.
#                                                     This parameter is optional. As an alternative,
#                                                     you can specify the more secure
#                                                     ServerSSLKeyringStashFile parameter to use a
#                                                     key database that was created with the gskkyman
#                                                     tool. The password and the stash file parameter
#                                                     are not required with a SAF key ring.
#
#         ServerSSLKeyringStashFile             (O):  A string 1 - 1023 characters in length that
#                                                     specifies the name of the key ring stash file.
#                                                     The stash file is created when the key ring
#                                                     file is created with the gskkyman tool. If
#                                                     the ServerSSLKeyringPassword parameter is
#                                                     specified, then it is used instead of this
#                                                     parameter. The password and the stash file
#                                                     parameter are not required with a SAF keyring.
#
#         ServerSSLName                         (O):  A string 1 - 256 characters in
#                                                     length specifying a case-sensitive
#                                                     value that specifies the label
#                                                     assigned when creating a private
#                                                     key/certificate pair with gskkyman.
#                                                     This is used when the client is
#                                                     authenticated.
#
#         ServerSSLV3CipherSuites               (O):  Specifies the SSL version 3 or TLS
#                                                     version 1 cipher suites in order of
#                                                     preference. If a ServerSSLV3CipherSuites
#                                                     or ServerSSLV3CipherSuites4Char
#                                                     parameter is specified more than once,
#                                                     the values are concatenated to create
#                                                     a single list of cipher suites. For
#                                                     System SSL, the GSK_V3_CIPHER_SPECS_EXPANDED
#                                                     value is set to the concatenated
#                                                     value.
#
#                                                     The ciphers value is a string of one or
#                                                     more 2-hexadecimal character ciphers
#                                                     that are SSL version 3 or TLS version
#                                                     1 ciphers, or a single cipher constant.
#                                                     The cipher string cannot have blanks between
#                                                     each cipher. If duplicate ciphers, the
#                                                     first instance of the cipher is used and
#                                                     all other instances you specify are ignored.
#                                                     The maximum number of ciphers is 255. For
#                                                     System SSL, see Appendix C. Cipher suite
#                                                     definitions in z/OS Cryptographic Services
#                                                     System SSL Programming for a list of valid
#                                                     cipher suites.
#
#         ServerSSLV3CipherSuites4Char           (O):  Specifies the SSL version 3 or TLS
#                                                     version 1 cipher suites in order of
#                                                     preference. If a ServerSSLV3CipherSuites
#                                                     or ServerSSLV3CipherSuites4Char
#                                                     parameter is specified more than once,
#                                                     the values are concatenated to create
#                                                     a single list of cipher suites. For
#                                                     System SSL, the GSK_V3_CIPHER_SPECS_EXPANDED
#                                                     value is set to the concatenated
#                                                     value.
#
#                                                     The ciphers value is a string of one or
#                                                     more 4-hexadecimal character ciphers
#                                                     that are SSL version 3 or TLS version
#                                                     1 ciphers. The cipher string does not recognize
#                                                     cipher constants and cannot have blanks between
#                                                     each cipher. If duplicate ciphers, the first instance
#                                                     of the cipher is used and all other instances you
#                                                     specify are ignored. The maximum number of ciphers
#                                                     is 255. For System SSL, see Appendix C. Cipher
#                                                     suite definitions in z/OS Cryptographic Services
#                                                     System SSL Programming for a list of valid
#                                                     cipher suites.
#
#         ServerSSLv3                           (O):  On | Off specifying whether SSLv3 is enabled or not.
#
#         ServerTLSv1.3                         (O):  On | Off specifying whether TLSv1.3 is enabled or not.
#                                                     If TLSv1.3 is enabled:
#                                                     - At least one cipher supported for TLSv1.3 must be
#                                                       specified on the ServerSSLV3CipherSuites4Char
#                                                       parameter
#                                                     - At least one cipher supported for earlier versions
#                                                       of TLS must be specified on the ServerSSLV3CipherSuites
#                                                       or ServerSSLV3CipherSuites4Char parameter.
#
#
#   example:
#     ServerConnection
#     {
#        ServerHost                   9.1.2.3
#        ServerPort                   16310
#        ServerHostBackup             policyserver.mynetwork.com
#        ServerPortBackup             16310
#        ServerConnectWait            60
#        ServerConnectRetries         3
#        ServerSSL
#        {
#           ServerSSLKeyring          /etc/client.kdb
#           ServerSSLKeyringStashFile /etc/client.sth
#           ServerSSLName             label1
#           ServerSSLV3CipherSuites   TLS_RSA_WITH_3DES_EDE_CBC_SHA
#           ServerSSLV3CipherSuites   TLS_DHE_RSA_WITH_3DES_EDE_CBC_SHA
#           ServerSSLV3CipherSuites   TLS_DHE_DSS_WITH_3DES_EDE_CBC_SHA
#           ServerSSLV3CipherSuites   TLS_DHE_RSA_WITH_AES_256_CBC_SHA
#           ServerSSLV3CipherSuites   TLS_DHE_DSS_WITH_AES_256_CBC_SHA
#           ServerSSLV3CipherSuites   TLS_DH_RSA_WITH_3DES_EDE_CBC_SHA
#           ServerSSLV3CipherSuites   TLS_DH_DSS_WITH_3DES_EDE_CBC_SHA
#           ServerSSLV3CipherSuites4Char 1301
#           ServerSSLv3               Off
#           ServerTLSv1.3             On
#        }
#     }

# ServicesConnection statement
#   The Policy Agent uses the ServicesConnection statement to specify the
#   listening port, listening TCP/IP image and security level for connections
#   to this Policy Agent.  Applications that use this connection are known
#   as service requestors.  The main service requestor is the IBM
#   Configuration Assistant for z/OS Communications Server which
#   requests TCP/IP interface information from a running TCP/IP stack,
#  for use in IPsec policy.
#
#   The Policy Agent listens for TCP connections only on the specified or
#   defaulted TCP/IP image name.
#
#   If you remove the ServicesConnection statement, all services requestor
#   connections to this Policy Agent are disconnected.
#
#   Updates to the ServicesConnection statement are used only for new services
#   requestor connections to the Policy Agent.
#
#   If you change the port value, the Policy Agent listens for new TCP
#   connections using the updated value on the specified or defaulted TCP/IP
#   image name.
#
#   If you don't configure the ServicesConnection statement, or the image
#   name is not an active TCP/IP image, the Policy Agent does not listen on
#   any port for services requestor connections.
#
#   If you want to use default values for all parameters, you can specify
#   the ServicesConnection statement without a set of braces.
#
#   If you specify Security Basic, you can either use a default unsecure
#   connection or supply user defined AT-TLS policies for this services
#   connection to create a secure SSL connection.
#
#   If you specify Security Secure, the Policy Agent generates an AT-TLS
#   policy and installs it at the lowest priority (lower than any configured
#   policies) into the specified or defaulted TCP/IP image after any configured
#   local or remote AT-TLS policies have already been installed. To see an
#   example of the generated policy, see the ServicesConnection statement in
#   the z/OS Communications Server: IP Configuration Reference.
#   - If you update any parameters that are used in the generated AT-TLS policy
#   (Port, Trace or Keyring parameters), the Policy Agent reinstalls the
#   generated policy.
#   - If you update the ImageName parameter, the Policy Agent uninstalls the
#     generated AT-TLS policy from the previous TCP/IP image and installs it
#     in the new image.
#   - If you change the Security parameter from Secure to Basic, the Policy
#   Agent uninstalls the generated AT-TLS policy from the specified or
#   defaulted TCP/IP image.
#
#   To restart the listen for services requestor connections and if required
#   to reinstall the generated AT-TLS policy, issue the MODIFY SRVLSTN command.
#   See Modify command--Policy Agent in z/OS Communications Server: IP System
#   Administrator's Guide for when you might use this command.
#
#   statement format:
#         ServicesConnection
#         {
#            Port                                  i  # Listening port
#            ImageName                             s  # Listening TCP/IP image
#            Security                              p  # Connection security type
#            Trace                                 i  # Trace value for AT-TLS policy
#            Keyring                               s  # Keyring name
#         }
#
#   where:
#         Port                                  (O):  Specifies the port that the Policy
#                                                     Agent listens on for TCP connections
#                                                     from services requestors on the
#                                                     specified or defaulted TCP/IP image name.
#                                                     If you are using the IBM Configuration
#                                                     Assistant for z/OS Communications Server,
#                                                     this port must be same as the Host
#                                                     Connection Port specification on the
#                                                     IPSec Discover Stack Symbols panel that
#                                                     connects to Policy Agent to request
#                                                     stack symbols from TCP/IP profile.
#
#                                                     The valid port values are in the range
#                                                     1 - 65535.  The default port value is 16311.
#
#                                                     The port value cannot match the port value
#                                                     configured on the ClientConnection statement.
#
#         ImageName                             (O):  A string 1 - 8 characters in length that
#                                                     specifies the TCP/IP image name. The Policy
#                                                     Agent listens for services connections only
#                                                     on this TCP/IP image.
#
#                                                     In a single stack (INET) environment, the
#                                                     Policy Agent uses the active TCP/IP image
#                                                     to listen for services connection requests.
#
#                                                     In a common INET (CINET) environment, if
#                                                     you don't specify the TCP/IP image name,
#                                                     the Policy Agent uses the default TCP/IP
#                                                     image (Resolver-supplied TCPIPuserid or
#                                                     TCPIPjobname).  If the default TCP/IP
#                                                     image cannot be determined, the Policy
#                                                     Agent uses the name "INET".
#
#                                                     If you specify an image name that does
#                                                     not have a corresponding TcpImage or
#                                                     PEPInstance statement, the Policy Agent
#                                                     creates an internal TcpImage statement
#                                                     to represent the specified TCP/IP image.
#                                                     This means you can specify only 7 (instead
#                                                     of 8) TcpImage or PEPInstance statements.
#
#                                                     If you specify an image name that is not
#                                                     active, the Policy Agent does not listen
#                                                     for services requestor connections until
#                                                     the TCP/IP image becomes active.
#
#         Security                              (O):  Indicates the level of security used for
#                                                     the services requestor connection.
#
#                                                     - Basic
#                                                       When Security Basic is configured, either:
#                                                       - The connection does not use SSL and is
#                                                         unsecure. In this case, the user ID and
#                                                         password that the services requestor provides
#                                                         flow without encryption.
#                                                       - You define AT-TLS policies for this
#                                                         services connection to create a secure
#                                                         SSL connection.
#
#                                                       Tip: For secure SSL, it is recommended to
#                                                            configure Security Basic and to supply
#                                                            user defined AT-TLS policies to protect
#                                                            the services connection with the required
#                                                            SSL/TLS protection.
#
#                                                     - Secure
#                                                       The connection uses SSL and the Policy
#                                                       Agent installs a generated AT-TLS
#                                                       policy to protect the connection.
#
#                                                       Policy Agent generates and installs an
#                                                       AT-TLS policy into the specified or
#                                                       defaulted TCP/IP image.  See z/OS
#                                                       Communications Server: IP Configuration
#                                                       Reference for details about the
#                                                       generated policy.
#                                                       Tip: This option only supports TLSv1.0 and
#                                                            TLSv1.1 and is not recommended for
#                                                            secure SSL.
#
#                                                       If you specify Security Secure, the
#                                                       Keyring parameter is required.
#
#         Trace                                 (O):  Specifies the level of AT-TLS tracing
#                                                     for the generated AT-TLS policy. The
#                                                     valid values for n are in the range
#                                                     0 - 255. The sum of the numbers associated
#                                                     with each level of tracing selected is
#                                                     the value that should be specified as n.
#                                                     If n is an odd number, errors are written
#                                                     to joblog and all other configured traces
#                                                     are sent to syslogd.  See z/OS Communications
#                                                     Server: IP Configuration Reference for
#                                                     details about the trace values.
#
#                                                     If you specify Security Basic, this parameter
#                                                     is ignored.
#
#         Keyring                               (C):  A string 1 - 1023 characters in length
#                                                     specifying the ring name of the SAF key
#                                                     ring. This key ring usually contains the
#                                                     certificates of the trusted (by the client)
#                                                     Certificate Authorities.
#
#                                                     If Security is configured with Secure, then
#                                                     this parameter is required.
#
#                                                     If you specify Security Basic, this parameter
#                                                     is ignored.
#
#   example:
#     ServicesConnection
#     {
#        Port                         16311
#        ImageName                    TCPIP1
#        Security                     Secure
#        Trace                        2
#        Keyring                      USERKEYRING
#     }

# CommonIDSConfig statement
#   The CommonIDSConfig statement specifies the path of a local IDS
#   policy file that contains common IDS policy statements.  These
#   common statements can be referenced from a stack specific IDS
#   policy file.  To define a common set of policies for multiple
#   stacks, the IDSConfig statement can specify the same
#   file as the CommonIDSConfig statement.
#
#   Stack specific IDS policies are defined in a stack IDS
#   specific policy file.  A stack specific IDS policy file is
#   identified by a IDSConfig statement.
#
#   The refresh interval for the CommonIDSConfig file is
#   inherited from the main configuration file.
#
#   Specify the IDSConfig statement without a path name in each
#   image configuration file to define a common set of policies
#   for multiple stacks.
#
#   The CommonIDSConfig statement may only appear in the main
#   configuration file.
#
#   If a CommonIDSConfig statement appears multiple times in the
#   main configuration file the last occurrence of the statement
#   will be used.  If the CommonIDSConfig statement appears in an
#   image configuration file it is ignored.
#
#   The configuration information defined in the file identified with
#   the CommonIDSConfig statement is prepended to the
#   configuration information defined in files identified with the
#   IDSConfig statement.  This has the following consequences:
#
#   - If no IDSConfig statements are specified, then the
#     CommonIDSConfig file is not parsed by Policy Agent.  The
#     IDSConfig statement is required if IDS configuration files
#     exist for a given stack.
#   - If multiple stacks are defined, the CommonIDSConfig file is
#     parsed for each stack, so any errors contained in the file are
#     reported multiple times.
#
#   statement format:
#         CommonIDSConfig    s1
#   where:
#         s1                                    (R):  The path of the common
#                                                     IDS policy file to be
#                                                     installed.
#
#   examples:
#     CommonIDSConfig /usr/lpp/tcpip/samples/pagent_IDS.conf
#     CommonIDSConfig  //'USER1.PAGENT.CONF(COMIDS)'

# IDSConfig Statements
#   The IDSConfig statement specifies the path of a local IDS
#   policy file that contains stack specific IDS policy statements.
#   The IDSConfig statement is required to define IDS policy
#   for a given stack.  To define a common set of policies for multiple
#   stacks, the IDSConfig statement can be specified with no
#   path name in each image configuration file.
#
#   The refresh interval for the IDSConfig file is inherited
#   from the image configuration file containing the corresponding
#   IDSConfig statement.
#
#   The IDSConfig statement may only appear in an image
#   configuration file.  If a IDSConfig statement appears
#   multiple times in an image configuration file the last occurrence of
#   the statement will be used.  If the IDSConfig statement
#   appears in the main configuration file it is ignored
#   (unless the main and image configuration files are the same file).
#
#   Use the FLUSH/NOFLUSH and PURGE/NOPURGE parameters to specify whether
#   or not IDS policies are deleted at startup (and when a MODIFY
#   PAGENT,REFRESH command is issued) and shutdown, respectively.
#   For details, see the FLUSH and PURGE considerations in the
#   z/OS Communications Server: IP Configuration Guide.
#
#   statement format:
#         IDSConfig    s1   p    p
#   where:
#         s1                                    (O):  The path of the stack
#                                                     specific IDS policy
#                                                     file to be installed.
#                                                     If no path name is
#                                                     specified, then the
#                                                     common IDS policy file
#                                                     specified on the
#                                                     CommonIDSConfig
#                                                     statement is used.
#         p                                     (O):  FLUSH | NOFLUSH,
#                                                     default value is
#                                                     obtained from the
#                                                     corresponding TcpImage or
#                                                     PEPInstance statement.
#         p                                     (O):  PURGE | NOPURGE,
#                                                     default value is
#                                                     obtained from the
#                                                     corresponding TcpImage or
#                                                     PEPInstance statement.
#
#   examples:
#     IDSConfig /usr/lpp/tcpip/samples/pagent_IDS.conf FLUSH NOPURGE
#     IDSConfig  //'USER1.PAGENT.CONF(IDS)' FLUSH NOPURGE

# CommonIpSecConfig statement
#   The CommonIpSecConfig statement specifies the path of a local IPSec
#   policy file that contains common IPSec policy statements.  These
#   common statements can be referenced from a stack specific IPSec
#   policy file.  To define a common set of policies for multiple
#   stacks, the IpSecConfig statement can specify the same
#   file as the CommonIpSecConfig statement.
#
#   Stack specific IPSec policies are defined in a stack IPSec
#   specific policy file.  A stack specific IPSec policy file is
#   identified by an IpSecConfig statement.
#
#   The refresh interval for the CommonIpSecConfig file is
#   inherited from the main configuration file.
#
#   The CommonIpSecConfig statement may only appear in the main
#   configuration file.
#
#   If a CommonIpSecConfig statement appears multiple times in the
#   main configuration file the last occurrence of the statement
#   will be used.  If the CommonIpSecConfig statement appears in an
#   image configuration file it is ignored.
#
#   The configuration information defined in the file identified with
#   the CommonIpSecConfig statement is prepended to the
#   configuration information defined in files identified with the
#   IpSecConfig statement.  This has the following consequences:
#
#   - If no IpSecConfig statements are specified, then the
#     CommonIpSecConfig file is not parsed by Policy Agent.  The
#     IpSecConfig statement is required to define IPSec policy for a
#     given stack.
#   - If multiple stacks are defined, the CommonIpSecConfig file is
#     parsed for each stack, so any errors contained in the file are
#     reported multiple times.
#
#   statement format:
#         CommonIPSecConfig    s1
#   where:
#         s1                                    (R):  The path of the common
#                                                     IPSec policy file to be
#                                                     installed.
#
#   examples:
#     CommonIPSecConfig /usr/lpp/tcpip/samples/pagent_CommonIPSec.conf
#     CommonIPSecConfig  //'USER1.PAGENT.CONF(COMIPSEC)'

# IPSecConfig Statements
#   The IpSecConfig statement specifies the path of a local IPSec
#   policy file that contains stack specific IPSec policy statements.
#   The IpSecConfig statement is required to define IPSec policy
#   for a given stack.  To define a common set of policies for multiple
#   stacks, the IpSecConfig statement can be specified with no
#   path name.
#
#   The refresh interval for the IpSecConfig file is inherited
#   from the image configuration file containing the corresponding
#   IpSecConfig statement.
#
#   The IpSecConfig statement may only appear in an image
#   configuration file.  If an IpSecConfig statement appears
#   multiple times in an image configuration file the last occurrence of
#   the statement will be used.  If the IpSecConfig statement
#   appears in the main configuration file it is ignored
#   (unless the main and image configuration files are the same file).
#
#   statement format:
#         IPSecConfig    s1
#   where:
#         s1                                    (O):  The path of the stack
#                                                     specific IPSec policy
#                                                     file to be installed.
#                                                     If no path name is
#                                                     specified, then the
#                                                     common IPSec policy file
#                                                     specified on the
#                                                     CommonIpSecConfig
#                                                     statement is used.
#
#   examples:
#     IPSecConfig /usr/lpp/tcpip/samples/pagent_IPSec.conf
#     IPSecConfig  //'USER1.PAGENT.CONF(IPSEC)'

# CommonRoutingConfig statement
#
#  Use the CommonRoutingConfig statement to specify the path of a local
#  Routing policy file that contains common Routing policy statements.
#  These common statements can be referenced from a stack-specific
#  Routing policy file. To define a common set of policies for multiple
#  stacks, use the RoutingConfig statement to specify the same file as
#  the CommonRoutingConfig statement.
#
#  Stack-specific Routing policies are defined in a stack-specific
#  Routing policy file. A stack-specific Routing policy file is
#  identified by a RoutingConfig statement.
#
#  The refresh interval for the CommonRoutingConfig file is inherited
#  from the main configuration file.
#
#  Restriction: The CommonRoutingConfig statement can appear only in the
#  main configuration file.
#
#  If a CommonRoutingConfig statement appears multiple times in the main
#  configuration file, the last occurrence of the statement is used.
#  If the CommonRoutingConfig statement appears in an image configuration
#  file, it is ignored.
#
#  The configuration information defined in the file identified with the
#  CommonRoutingConfig statement is prepended to the configuration
#  information defined in files identified with the RoutingConfig
#  statement. This action has the following consequences:
#
#  - If no RoutingConfig statements are specified, then the
#    CommonRoutingConfig file is not parsed by Policy Agent.
#
#    Requirement: The RoutingConfig statement is required if Routing
#    configuration files exist for a given stack.
#  - If multiple stacks are defined, the CommonRoutingConfig file is
#    parsed for each stack; thus, any errors contained in the file are
#    reported multiple times.
#
#   statement format:
#         CommonRoutingConfig    s1
#   where:
#         s1                      (R):  The path of the common
#                                       Routing policy file to be
#                                       installed.
#
#   examples:
#     CommonRoutingConfig /usr/lpp/tcpip/samples/pagent_Routing.conf
#     CommonRoutingConfig  //'USER1.PAGENT.CONF(COMROUT)'

# RoutingConfig Statements
#  Use the RoutingConfig statement to specify the path of a local
#  Routing policy file that contains stack-specific Routing policy
#  statements.
#
#  Requirement: The RoutingConfig statement is required to define
#               Routing policy for a given stack.
#
#  Results:
#    For the associated TCP/IP image on the policy client, if the
#    PolicyServer statement specifies remote Routing policies, then
#    the following occurs:
#    - If no local Routing policies are installed, then the
#      RoutingConfig statement is ignored.
#    - If local Routing policies are already installed, then this is
#      treated as if the RoutingConfig statement has been deleted.
#
#  Specify the RoutingConfig statement with no path name in each image
#  configuration file to define a common set of policies for multiple
#  stacks.
#
#  The refresh interval for the RoutingConfig file is inherited from
#  the image configuration file containing the corresponding
#  RoutingConfig statement.
#
#  Restriction: The RoutingConfig statement can appear only in an image
#  configuration file.
#
#  If a RoutingConfig statement appears multiple times in an image
#  configuration file, the last occurrence of the statement is used.
#  If the RoutingConfig statement appears in the main configuration
#  file, it is ignored (unless the main and image configuration files
#  are the same file).
#
#   statement format:
#         RoutingConfig   s1
#   where:
#         s1                       (O):  The path of the stack
#                                        specific Routing policy
#                                        file to be installed.
#                                        If no path name is
#                                        specified, then the
#                                        common Routing policy file
#                                        specified on the
#                                        CommonRoutingConfig
#                                        statement is used.
#
#   examples:
#     RoutingConfig /usr/lpp/tcpip/samples/pagent_Routing.conf
#     RoutingConfig  //'USER1.PAGENT.CONF(ROUTING)'

# CommonTTLSConfig statement
#   The CommonTTLSConfig statement specifies the path of a local TTLS
#   policy file that contains common TTLS policy statements.  These
#   common statements can be referenced from a stack specific TTLS
#   policy file.  To define a common set of policies for multiple
#   stacks, the TTLSConfig statement can specify the same
#   file as the CommonTTLSConfig statement.
#
#   Stack specific TTLS policies are defined in a stack TTLS
#   specific policy file.  A stack specific TTLS policy file is
#   identified by a TTLSConfig statement.
#
#   The refresh interval for the CommonTTLSConfig file is
#   inherited from the main configuration file.
#
#   The CommonTTLSConfig statement may only appear in the main
#   configuration file.
#
#   If a CommonTTLSConfig statement appears multiple times in the
#   main configuration file the last occurrence of the statement
#   will be used.  If the CommonTTLSConfig statement appears in an
#   image configuration file it is ignored.
#
#   The configuration information defined in the file identified with
#   the CommonTTLSConfig statement is prepended to the
#   configuration information defined in files identified with the
#   TTLSConfig statement.  This has the following consequences:
#
#   - If no TTLSConfig statements are specified, then the
#     CommonTTLSConfig file is not parsed by Policy Agent.  The
#     TTLSConfig statement is required to define TTLS policy for a
#     given stack.
#   - If multiple stacks are defined, the CommonTTLSConfig file is
#     parsed for each stack, so any errors contained in the file are
#     reported multiple times.
#
#   statement format:
#         CommonTTLSConfig    s1
#   where:
#         s1                                    (R):  The path of the common
#                                                     TTLS policy file to be
#                                                     installed.
#
#   examples:
#     CommonTTLSConfig /usr/lpp/tcpip/samples/pagent_TTLS.conf
#     CommonTTLSConfig  //'USER1.PAGENT.CONF(COMTTLS)'

# TTLSConfig Statements
#   The TTLSConfig statement specifies the path of a local TTLS
#   policy file that contains stack specific TTLS policy statements.
#   The TTLSConfig statement is required to define TTLS policy
#   for a given stack.  To define a common set of policies for multiple
#   stacks, the TTLSConfig statement can be specified with no
#   path name.
#
#   The refresh interval for the TTLSConfig file is inherited
#   from the image configuration file containing the corresponding
#   TTLSConfig statement.
#
#   The TTLSConfig statement may only appear in an image
#   configuration file.  If a TTLSConfig statement appears
#   multiple times in an image configuration file the last occurrence of
#   the statement will be used.  If the TTLSConfig statement
#   appears in the main configuration file it is ignored
#   (unless the main and image configuration files are the same file).
#
#   Use the FLUSH/NOFLUSH and PURGE/NOPURGE parameters to specify whether
#   or not TTLS policies are deleted at startup (and when a MODIFY
#   PAGENT,REFRESH command is issued) and shutdown, respectively.
#   For details, see the FLUSH and PURGE considerations in the
#   z/OS Communications Server: IP Configuration Guide.
#
#   statement format:
#         TTLSConfig    s1   p    p
#   where:
#         s1                                    (O):  The path of the stack
#                                                     specific TTLS policy
#                                                     file to be installed.
#                                                     If no path name is
#                                                     specified, then the
#                                                     common TTLS policy file
#                                                     specified on the
#                                                     CommonTTLSConfig
#                                                     statement is used.
#         p                                     (O):  FLUSH | NOFLUSH,
#                                                     default value is
#                                                     obtained from the
#                                                     corresponding TcpImage or
#                                                     PEPInstance statement.
#         p                                     (O):  PURGE | NOPURGE,
#                                                     default value is
#                                                     obtained from the
#                                                     corresponding TcpImage or
#                                                     PEPInstance statement.
#
#   examples:
#     TTLSConfig /usr/lpp/tcpip/samples/pagent_TTLS.conf FLUSH NOPURGE
#     TTLSConfig  //'USER1.PAGENT.CONF(TTLS)' FLUSH NOPURGE

# QOSConfig Statement
#   The QOSConfig statement specifies the path of a QoS
#   policy file that contains stack specific QoS policy statements.
#   The QOSConfig statement is optional.  Two methods can be used
#   to define QoS policy for a given stack:
#
#   1) Specify the QOSConfig statement in the image configuration
#      file, and specify the QoS policy statements in the file
#      specified on the QOSConfig statement.
#
#   2) Specify the QoS policy statements directly in the image
#      configuration file, without specifying the QOSConfig
#      statement.
#
#   The refresh interval for the QOSConfig file is inherited
#   from the image configuration file containing the corresponding
#   QOSConfig statement.
#
#   The QOSConfig statement may only appear in an image
#   configuration file.  If a QOSConfig statement appears
#   multiple times in an image configuration file the last occurrence of
#   the statement will be used.  If the QOSConfig statement
#   appears in the main configuration file it is ignored
#   (unless the main and image configuration files are the same file).
#
#   statement format:
#         QOSConfig      s1
#   where:
#         s1                                    (O):  The path of the stack
#                                                     specific QoS policy
#                                                     file to be installed.
#
#   examples:
#     QOSConfig /u/user10/pagent_QoS.conf
#     QOSConfig  //'USER1.PAGENT.CONF(QOS)'

# ZERTConfig Statements
#  Use the ZERTConfig statement to specify the path of a local
#  ZERT policy file that contains stack-specific ZERT policy
#  statements.
#
#  Requirement: The ZERTConfig statement is required to define
#               ZERT policy for a given stack.
#
#  Results:
#    For the associated TCP/IP image on the policy client, if the
#    PolicyServer statement specifies remote ZERT policies, then
#    the following occurs:
#    - If no local ZERT policies are installed, then the
#      ZERTConfig statement is ignored.
#    - If local ZERT policies are already installed, then this is
#      treated as if the ZERTConfig statement has been deleted.
#
#  The refresh interval for the ZERTConfig file is inherited from
#  the image configuration file containing the corresponding
#  ZERTConfig statement.
#
#  Restriction: The ZERTConfig statement can appear only in an image
#  configuration file.
#
#  If a ZERTConfig statement appears multiple times in an image
#  configuration file, the last occurrence of the statement is used.
#  If the ZERTConfig statement appears in the main configuration
#  file, it is ignored (unless the main and image configuration files
#  are the same file).
#
#   statement format:
#         ZERTConfig   s1
#   where:
#         s1                       (R):  The path of the stack
#                                        specific ZERT policy
#                                        file to be installed.
#
#   examples:
#     ZERTConfig /usr/lpp/tcpip/samples/pagent_ZERT.conf
#     ZERTConfig  //'USER1.PAGENT.CONF(ZERT)'

# ReadFromDirectory Statement
#   This statement initializes the LDAP client so that the rules will be
#   downloaded from the LDAP server in addition to being read from this
#   configuration file.
#
#   statement format:
#         ReadFromDirectory
#         {
#            LDAP_Server                       (a|s)  # Name or IPv4 address of the directory server.
#            LDAP_Port                             i  # The port of the directory server.
#            LDAP_BackupServer                 (a|s)  # Name or IPv4 address of the backup directory
#                                                     #  server.
#            LDAP_BackupPort                       i  # The port of the backup directory server.
#            LDAP_DistinguishedName                l  # LDAP logon id.
#            LDAP_Password                         s  # LDAP logon password.
#            LDAP_SSL                                 # LDAP SSL security specification.
#            {
#               LDAP_SSLKeyringFile                s  # SSL key ring file specification.
#               LDAP_SSLKeyringPassword            s  # Password to the key ring file.
#               LDAP_SSLName                       s  # Key ring label name.
#            }
#            LDAP_SessionPersistent                p  # Should the LDAP session with the server
#                                                     #  be kept open?
#            LDAP_ProtocolVersion                  3  # LDAP protocol version.
#            LDAP_SchemaVersion                1|2|3  # Policy schema version.
#            Base                                  l  # The base to look up policies from the server
#                                                     #  (for version 1 policies).
#            LDAP_SelectedTag                      s  # A tag to select policies for this host
#                                                     #  (for version 1 policies).
#            LDAP_AbstractPolicy                   p  # Whether or no abstract policy searching is
#                                                     #  supported by the LDAP server.
#            SearchPolicyBaseDN                    l  # The base to look up policies from the server
#                                                     #  (for version 2 and up policies).
#            SearchPolicyKeyword                   s  # Search keyword for policy objects
#                                                     #  (for version 3 policies).
#            SearchPolicyGroupKeyWord              s  # Search keyword for policy group objects
#                                                     #  (for version 2 and up policies).
#            SearchPolicyRuleKeyWord               s  # Search keyword for policy rule objects
#                                                     #  (for version 2 and up policies).
#            PolicyRole                            s  # Roles or role-combinations played by this
#                                                     #  LDAP client (i.e. Policy Agent).
#         }
#   where:
#         LDAP_Server                           (O):  LDAP_Server is the domain name or the IPv4
#                                                      address of the directory server. If the user
#                                                      does not specify this value, the default
#                                                      is the local host which is 127.0.0.1.
#
#         LDAP_Port                             (O):  LDAP_Port is the port on which the
#                                                      directory server is running.  If the user
#                                                      does not specify this value, the default
#                                                      LDAP port of 389 is used.
#
#         LDAP_BackupServer                     (O):  Domain name or IPv4 address of the
#                                                      backup directory server.  This is used
#                                                      when Pagent can't contact the primary
#                                                      server.  Default is no backup server.
#
#         LDAP_BackupPort                       (O):  The port on which the backup directory server
#                                                      is running.   Default is 389.
#
#         LDAP_DistinguishedName                (C):  The Distinguished Name for userid to be
#                                                      used when connecting to the LDAP server.
#                                                      If this attribute is not specified,
#                                                      anonymous userid is used for the connect.
#                                                      If this attribute is specified,
#                                                      LDAP_Password must also be specified.  Case
#                                                      sensitivity is determined by the LDAP server.
#
#         LDAP_Password                         (C):  The password to be used when connecting to
#                                                      the LDAP server.  If this attribute is
#                                                      specified.  LDAP_DistinguishedName must
#                                                      also be specified.
#
#         LDAP_SSLKeyringFile                   (C):  The name of the keyring file, which
#                                                      contains the certificates trusted by the
#                                                      client.  The file may also contain a
#                                                      public key and certificate.  This parameter
#                                                      is required if LDAP_SSL is specified.
#
#         LDAP_SSLKeyringPassword               (O):  The password of the keyring file.  The
#                                                      password is set using the gskkyman tool.
#
#         LDAP_SSLName                          (O):  The label assigned to your private key /
#                                                      certificate pair, created with the gskkyman
#                                                      tool.
#
#         LDAP_SessionPersistent                (O):  LDAP_SessionPersistent is YES|NO that
#                                                      indicates if the session with the LDAP
#                                                      server should be kept open or not, for the
#                                                      purpose of querying for updates at the
#                                                      interval specified on the TcpImage statement.
#                                                      If this interval is small, the value of
#                                                      keeping the session opened is greater, to
#                                                      reduce the overhead of opening the session
#                                                      for each query.  The default is NO.
#
#         LDAP_ProtocolVersion                  (O):  LDAP protocol version to be used.  Supported
#                                                      version is 3.  Default is 3.
#
#         LDAP_SchemaVersion                    (O):  LDAP Policy schema version.  Version 1 is for
#                                                      policy schemas from releases prior to CS
#                                                      for OS390 V2R10.  Version 2 is for policy
#                                                      schemas for CS for OS390 V2R10.  Version 3
#                                                      is for policy schemas as of OS390 V1R2.
#                                                      Default is 3.
#
#         Base                                  (C):  Base is the distinguished name of the
#                                                      subtree in the directory where the policies
#                                                      are located.  This parameter is required
#                                                      with schema version 1.
#
#         LDAP_SelectedTag                      (O):  LDAP_SelectedTag is any string which can
#                                                      be used to select a subset of the policies
#                                                      under the base tree.  If this value is not
#                                                      specified, the first name returned by
#                                                      gethostname() is used as the tag.  This
#                                                      parameter is used in searching version 1
#                                                      schema.
#
#         LDAP_AbstractPolicy                   (O):  LDAP_AbstractPolicy is YES|NO.  Choose YES
#                                                      for LDAP version 3 servers that are
#                                                      capable of matching objectClass for abstract
#                                                      and auxiliary classes.  Choose NO otherwise.
#                                                      When YES is chosen, Pagent uses
#                                                      objectClass=ibm-policy when searching the
#                                                      server.  Otherwise, it uses objectClass=*
#                                                      (all object classes).  The default is YES.
#
#         SearchPolicyBaseDN                    (C):  The distinguished name of the subtree under
#                                                      which to find policies that are defined
#                                                      with schema version 2 and up.  This parameter
#                                                      is required with schema version 2 and up.
#                                                      Case sensitivity is determined by the LDAP
#                                                      server.
#
#         SearchPolicyKeyword                   (O):  Keyword used to search for policy objects
#                                                      under the subtree.  This is only allowed
#                                                      with version 3 schema and it is used in
#                                                      the initial search.  Up to 8 instances of
#                                                      this attribute can be specified.  This value
#                                                      is matched against the policyKeywords
#                                                      attribute in the policy rules.  Case
#                                                      sensitivity is determined by the LDAP server.
#
#         SearchPolicyGroupKeyWord              (O):  Keyword used to search for policy groups under
#                                                      the subtree (e.g., search scoping).  This is
#                                                      only allowed with version 2 and up schema and
#                                                      it is used in the initial search.  Up to 8
#                                                      instances of this attribute can be specified.
#                                                      This value is matched against the
#                                                      policyGroupKeywords attribute in the policy
#                                                      groups.  Case sensitivity is determined
#                                                      by the LDAP server.
#
#         SearchPolicyRuleKeyWord               (O):  Keyword used to search for policy rules under
#                                                      the subtree.  This is only allowed with
#                                                      version 2 and up schema and it is used in the
#                                                      initial search.  Up to 8 instances of this
#                                                      attribute can be specified.  This value is
#                                                      matched against the policyRuleKeywords
#                                                      attribute in the policy rules.  Case
#                                                      sensitivity is determined by the LDAP server.
#
#         PolicyRole                            (O):  Specifies a policy role or role-combination
#                                                      (see below).  Use this parameter to filter
#                                                      the policy rules to be retrieved.  This
#                                                      parameter is only valid with schema version
#                                                      3.  This parameter can be repeated as many
#                                                      times as necessary.  Either a single role or
#                                                      a set of roles, known as a role-combination,
#                                                      may be specified.  The roles may be single
#                                                      words, or any strings containing blanks or
#                                                      other special characters, contained in
#                                                      double quotes.  Role-combinations are
#                                                      specified as follows.  The first role is
#                                                      specified the same way that a single role is
#                                                      specified.  Each additional role in the
#                                                      role-combination is prefixed with the
#                                                      characters "&&".  For example:
#                                                       PolicyRole     role1
#                                                       PolicyRole     &&"quoted role 2"
#                                                       PolicyRole     "quoted role 3"
#                                                       PolicyRole     role4
#                                                      This parameter is used to filter out policy
#                                                      rules that don't contain any of the
#                                                      specified roles or role-combinations, using
#                                                      the attribute ibm-policyRoles.  For example,
#                                                      the set of roles specified above result in
#                                                      the retrieval of any policy rules that
#                                                      specify "role1&&quoted role 2" or "quoted
#                                                      role3" or "role4" in their policyRoles
#                                                      values.
#
# Note: If the LDAP server being used is an z/OS LDAP server prior to  Version 2 Release 10 then
#       only one of the parameters SearchPolicyGroupKeyWord or SearchPolicyRuleKeyWord may be used.
#       If both parameters are used the LDAP server will not return any policy information.
#
#
#   example:  ReadFromDirectory
#             {
#               LDAP_Server             9.10.11.12
#               LDAP_Port               9000
#               LDAP_DistinguishedName  cn=root, o=IBM, c=US
#               LDAP_Password           secret
#               LDAP_ProtocolVersion    3
#               LDAP_SchemaVersion      3
#               SearchPolicyBaseDN      cn=group5, o=IBM, c=US
#             }

# PolicyPerfMonitorForSDR Statement
#   This statement is used to enable/disable (without this statement, this
#   function is turned off) the policy performance monitor function that
#   assigns a QoS weight fraction to the monitored policy performance data and
#   sends messages to the Sysplex Distributor (SD) routing component as the
#   monitored data crosses its defined thresholds.  SD uses this weight
#   fraction to influence its routing decision on the incoming connection
#   requests to appropriate hosts within a group that is responsible for
#   processing the request.   The QoS weight fraction is used by SD to reduce
#   the availability factor that SD obtains from the Work Load Manager (WLM).
#   For instance, assume the WLM weight (available processing capacity) is 64 and
#   the QoS performance monitor detects a significant loss rate over the network
#   from the corresponding node in the sysplex.  Also assume that the QoS
#   weight fraction is 50%: the resulting weight used in routing incoming
#   connection requests to that node is now only 32 (64x0.5) instead of 64.
#   This weight adjustment results in balancing the work load in the sysplex
#   taking into account both the node processing capacity and the QoS
#   performance over the network.
#
#   Note that there must exist at least one policy rule definition that covers
#   the application whose incoming connection request is being routed by SD.
#   The policy rule(s) enables the collection of the performance data.  This
#   function only works with TCP since other IP transports contain data
#   retransmission and error recovery.   Also, if IDS TR policies
#   exist that cover the application, and if a limit on the total connections
#   is defined, then when the total active connections for that application
#   reaches the contrained state (i.e. 90% of the defined total), the QOS weight
#   fraction will be set to 100%.   This will divert incoming connection
#   requests for the application away from the corresponding target node.
#
#   statement format:
#         PolicyPerfMonitorForSDR     Enable/Disable  # Default is Disable. If Enable,
#                                                     #  the following parameters can
#                                                     #  be specified.
#         {
#            SamplingInterval                      i  # How often to sample the policy
#                                                     #  performance information.
#            LossRatioAndWeightFr                i i  # The first number is the unit ratio of
#                                                     #  retransmitted bytes (loss) over
#                                                     #  transmitted bytes; the second is
#                                                     #  the weight fraction to be assigned.
#            LossMaxWeightFr                       i  # Maximum weight fraction to be assigned.
#            TimeoutRatioAndWeightFr             i i  # The first number is the unit ratio of
#                                                     #  the number of timeouts over
#                                                     #  total packets transmitted; the second
#                                                     #  is the weight fraction to be assigned.
#            TimeoutMaxWeightFr                    i  # Maximum weight fraction to be assigned.
#         }
#   where:
#         SamplingInterval                      (O):  In units of seconds. Default is 60 seconds.
#         LossRatioAndWeightFr                  (O):  Loss (Retransmission) Ratio is in units of
#                                                      tenths of a percent (1-1000) and the
#                                                      weight fraction is in percentage units
#                                                      (1-100%).  Default is 10 and 10, meaning 1%
#                                                      unit loss ratio corresponds to 10% fraction.
#                                                      A weight fraction of 0 means to suppress
#                                                      loss ratio factor in SD routing.
#         LossMaxWeightFr                       (O):  Weight fraction is added or subtracted
#                                                      as the ratio exceeds the next unit or
#                                                      retreats to the lower unit.  If the
#                                                      monitored loss ratio increases such that
#                                                      the weight fraction exceeds the maximum,
#                                                      only maximum weight fraction is sent to SD.
#                                                      Default is 100, or 100%.
#         TimeoutRatioAndWeightFr               (O):  Time out Ratio is also in units of tenths of
#                                                      a percent and the weight fraction is in
#                                                      percentage.  Default is 10 and 20,
#                                                      respectively.  A weight fraction of 0 means
#                                                      to suppress timeout ratio factor in SD
#                                                      routing.
#         TimeoutMaxWeightFr                    (O):  Default is 100%.
#
#   example:  PolicyPerfMonitorForSDR    Enable
#             {
#                Samplinginterval          120
#                LossRatioAndWeightFr    10 20
#                LossMaxWeightFr           100
#                TimeoutRatioAndWeightFr  5 50
#                TimeoutMaxWeightFr        100
#             }
#
#      In this example, Pagent will send to SDR a message when the loss
#      (retransmission) ratio begins to exceed 1% but not above 2%, with
#      a weight fraction of 20%  (this means that the WLM weight will be
#      decreased by 20% before it is used as a measure to route incoming
#      connection requests).   When the loss (retransmission) ratio exceeds
#      2% but not above 3%, a message is sent with a weight fraction of 40%,
#      and so on.  When the loss exceeds 5%, a maximum weight fraction of 100%
#      will be used.  The same with the timeout ratio.  When the timeout ratio
#      exceeds 0.5% but not above 1%, a weight fraction of 50%  is added to
#      QoS fraction in the message sent to SD.  And so on.

# PolicyPerformanceCollection Statement
#   This statement is used to enable/disable the policy performance collection
#   function. Without this statement, this function is turned off by default.
#   When enabled, the Policy Agent collects performance data from the kernel
#   and caches it. This performance data is then made available to user
#   applications through the Policy API (PAPI). This data can also be
#   optionally logged to a performance log file for offline performance
#   analysis.
#
#   statement format:
#         PolicyPerformanceCollection Enable/Disable  # Default is Disable.
#         {
#            DataCollection                        p+ # Specifies the type of performance
#                                                     #  data that needs to be collected.
#            MinimumSamplingInterval               i  # The minimum time at which performance
#                                                     #  data will be collected from the kernel
#            LogSamplingInterval                   i  # The time at which performance data will
#                                                     #  be collected from the kernel and logged
#                                                     #  into the performance log file.
#            PerformanceLogFile                    s  # Specifies the name of the file to which
#                                                     #  performance data needs to be logged.
#            NumberOfLogFiles                      i  # Specifies the number of performance log
#                                                     #  files to be maintained.
#            SizeOfLogFile                         i  # Specifies the size of each log file.
#         }
#   where:
#         DataCollection                        (O):  Specifies the type of performance data that
#                                                      will be collected. The values could be
#                                                      RULE or ACTION. Default is RULE.
#         MinimumSamplingInterval               (O):  In seconds. Value ranges from 30 to
#                                                      2147483647. Default is 30.
#         LogSamplingInterval                   (C):  In seconds. Value ranges from 30 to
#                                                      2147483647. If LogSamplingInterval is
#                                                      specified then PerformanceLogFile needs
#                                                      to be specifed.
#         PerformanceLogFile                    (C):  Specifies the name of the log file.
#                                                      PerformanceLogFile needs to be specified
#                                                      if LogSamplingInterval is specified.
#         NumberOfLogFiles                      (O):  Ranges from 1 - 255. Default is 3.
#         SizeOfLogFile                         (O):  In kilobytes (Kb). Value ranges from 1 -
#                                                      1000000Kb.  Default is 300 Kb.
#
#   example:  PolicyPerformanceCollection   Enable
#             {
#                DataCollection            RULE ACTION
#                MinimumSamplingInterval   60
#                LogSamplingInterval       60
#                PerformanceLogFile        /tmp/perfdata.log
#             }
#
#      In this example, Pagent will collect the performance data from the
#      kernel every 60 seconds and will log the performance data to the
#      performance log file (/tmp/perfdata.log) every 60 seconds.

# SetSubnetPrioTosMask Statement
#   This statement defines the TOS/priority field in the IP header type of
#   service byte.  It is used by the TCP/IP stack to read the TOS value and
#   assign appropriate service to the corresponding IP packets.  If this
#   statement is not specified, TCP/IP will use the system default TOS mask
#   and priority levels for all interfaces currently defined for IPv4
#   (RFC 791).  Note that there is an alternate definition for the TOS
#   byte referred to as the DS (Differentiated Services) byte, see RFC 2474
#   for details.  This statement can be used to support the DS byte format.
#   statement format:
#         SetSubnetPrioTosMask
#         {
#            SubnetAddr                            a  # Subnet IP address.
#            SubnetTosMask                         b  # TOS mask to obtain priority level.
#            PriorityTosMapping                B b B  # Priority level, corresponding TOS,
#                                                     # and optional user priority.
#         }
#   where:
#         SubnetAddr                            (O):  Is the local subnet interface address.
#                                                      Default is 0, meaning the mask is the same
#                                                      for all interfaces.
#         SubnetTosMask                         (R):  The TOS mask  (e.g., 11100000).
#         PriorityTosMapping                    (O):  This key can be repeated for each priority
#                                                      level to Tos value mapping.  For example:
#                                                      PriorityTosMapping  0 0
#                                                      PriorityTosMapping  1 01000000
#
#                                                      The third parameter is the user priority,
#                                                      which is also known as the VLAN priority,
#                                                      and is an optional parameter.
#                                                      This allows the Virtual LAN (VLAN) user
#                                                      priority to be set for those devices
#                                                      that support tagging of VLAN frames.
#
# CAUTION: The coding of the user priority (third parameter) will
# cause the frame to be sent out based on the IEEE 802.1Q
# specification which establishes a standard method for tagging
# Ethernet frames with VLAN priority and membership information.
# Specifically, VLAN priority tagged frame is used to convey packet
# priority to the switches, and has NULL for VLANID.  A full VLAN
# tagged frame supported as of CS for z/OS V1R5 contains both the
# priority and non-NULL VLANID.  If you have switches in your
# network that DO NOT support the IEEE 802.1Q standard (either VLAN
# priority tagged frames or full VLAN tagged frames) or are not
# properly configured for this frame, the frame may be dropped by
# the switch.
#
#   example:  SetSubNetPrioTosMask
#             {
#               SubnetTosMask       11100000
#               PriorityTosMapping  1 1110000 7
#               PriorityTosMapping  1 1100000 6
#               PriorityTosMapping  2 1010000 5
#               PriorityTosMapping  2 1000000 4
#               PriorityTosMapping  3 0110000 3
#               PriorityTosMapping  3 0100000 2
#               PriorityTosMapping  4 0010000 1
#               PriorityTosMapping  4 0000000 0
#             }


# PolicyAction Statement
#   This statement specifies the QoS that a flow of IP packets
#   (e.g., from a TCP connection, or UDP data) should receive end-to-end
#   as they traverse the network.  In addition to QoS, this statement
#   can also be used to specify Traffic Regulation Management action to
#   be performed by TCP/IP for a target application specified in the
#   policyRule.
#
#   statement format:
#         policyAction                             s  # Policy action name.
#         {
#            PolicyScope                           p  # Type of action to be performed.
#            Permission                            p  # If packets belonging to this
#                                                     #  action should be discarded
#                                                     #  or allowed to proceed.
#            MaxRate                               i  # Maximum rate/thoughput per TCP
#                                                     #  connection allowed for traffic
#                                                     #  in this action.
#            MinRate                               i  # Minimum rate/throughput per TCP
#                                                     #  connection allowed for traffic
#                                                     #  in this action.
#            MaxDelay                              i  # Maximum end-to-end delay time.
#                                                     # Result:  MaxDelay parameter is no
#                                                     #          longer supported and
#                                                     #          will be ignored.
#            OutgoingTOS                           b  # TOS/DS value of outbound traffic
#                                                     #  belonging to this action.
#            MaxConnections                        i  # Maximum number of end-to-end TCP
#                                                     #  connections at any instance of time
#                                                     #  for this action.
#            OutboundInterface                     a  # Sysplex Distributor routing interface.
#                                                     # The following are leaky bucket traffic
#                                                     #  conditioning parameters:
#            DiffServInProfileRate                 i  # Token generation rate.
#            DiffServInProfilePeakRate             i  # Leaky bucket peak rate.
#            DiffServInProfileTokenBucket          i  # Burst size.
#            DiffServInProfileMaxPacketSize        i  # Peak rate max packet size.
#            DiffServOutProfileTransmittedTOSByte  b  # TOS/DS for out-of-profile
#                                                     #  traffic.
#            DiffServExcessTrafficTreatment        p  # Treatment for out-of-profile traffic.
#                                                     # The following are RSVP parameters:
#            InboundScope                          p  # Inbound QoS service type.
#            AverageConnectionRate                 i  # Average new inbound connections per
#                                                     # second.
#            ConnectionBurstSize                   i  # Maximum number of new concurrent
#                                                     # inbound connections.
#            PeakConnectionRate                    i  # Peak rate of inbound connection
#                                                     # token bucket conditioner.
#            AverageApplicationRate                i  # Average new application requests
#                                                     # per second.
#            AverageApplicationRequestRate         i  # Synonym for AverageApplicationRate.
#            ApplicationBurstSize                  i  # Maximum number of new concurrent
#                                                     # application requests.
#            ApplicationRequestBurstSize           i  # Synonym for ApplicationBurstSize.
#            ApplicationPeakRate                   i  # Peak rate of application request
#                                                     # token bucket conditioner.
#            ApplicationRequestPeakRate            i  # Synonym for ApplicationPeakRate.
#            PrioritizedQueue                      p  # Order of processing inbound
#                                                     # connections.
#            InboundAcceptQueueID                  s  # Identifier of accept queue
#                                                     # for inbound traffic.
#            FlowServiceType                       p  # Type of RSVP reserved traffic.
#            MaxRatePerFlow                        i  # Maximum rate a flow in this service
#                                                     #  category is allowed to reserve.
#            MaxTokenBucketPerFlow                 i  # Maximum token bucket size per flow.
#            MaxFlows                              i  # Maximum number of reserved flows.
#            SignalClient                          p  # Enable RSVP for TCP/UDP connection.
#            NumberOfAcceptQueues                  i  # Number of accept queue configuration
#                                                     # policy queues.
#            AcceptQueueIDandWeight              s i  # Identifier and weight for one of the
#                                                     # accept queue configuration policy
#                                                     # queues.
#            DefaultAcceptQueueID                  s  # Default accept queue identifier for
#                                                     # accept queue configuration policy.
#         }
#   where:
#         s                                     (R):  Is the name of this policy action
#                                                      (up to 32 characters, truncated if
#                                                      longer).
#         PolicyScope                           (O):  DataTraffic | RSVP | Both
#                                                      Default is Both, which means both
#                                                      DataTraffic and RSVP.
#         Permission                            (O):  Allowed | Blocked, default is Allowed.
#         MaxRate                               (O):  in Kbps (K bits per second), default is
#                                                      infinite.
#         MinRate                               (O):  In Kbps, default is zero.
#         MaxDelay                              (O):  Default is non-specified (infinite).
#                                                     # Result:  MaxDelay parameter is no
#                                                     #          longer supported and
#                                                     #          will be ignored.
#         OutgoingTOS                           (O):  Default is 0.
#         MaxConnections                        (O):  Default is non-specified (infinite).
#         OutboundInterface                     (O):  Sysplex Distributor routing interfaces.
#                                                      Up to 32 instances of this attribute may be
#                                                      specified.  If 0 is specified, then the SD
#                                                      routing component can use any available
#                                                      target server if the target servers
#                                                      identified with instances of this attribute
#                                                      are not available.  Default is no policy
#                                                      control of Sysplex Distributor routing
#                                                      interfaces.  Only IPv4 addresses can
#                                                      be specified.
#         DiffServInProfileRate                 (C):  In Kbps, specifies the mean rate (token
#                                                     generating rate) of a token bucket traffic
#                                                     conditioner that enforces the rate of
#                                                     traffic that is mapped to the corresponding
#                                                     policy action by a policy rule. If the
#                                                     traffic exceeds this rate, it will be
#                                                     considered as out-of-profile and therefore
#                                                     will be treated with the action specified in
#                                                     DiffServExcessTrafficTreatment attribute.
#                                                     If this value is non-zero, but
#                                                     DiffServInProfileTokenBucket attribute is zero,
#                                                     then no token bucket traffic enforcement is
#                                                     performed.
#         DiffServInProfilePeakRate             (C):  In Kbps, specifies the peak rate of a token
#                                                     bucket traffic conditioner that enforces
#                                                     the peak rate of traffic that is mapped to
#                                                     the corresponding policy action by a
#                                                     policy rule.  If the traffic exceeds this
#                                                     rate, it will be considered as out-of-profile
#                                                     and therefore will be treated with the
#                                                     DiffServExcessTrafficTreatment attribute.  If
#                                                     this value is non-zero, but
#                                                     DiffServInProfileMaxPacketSize or
#                                                     DiffServInProfileRate attribute is zero, then no token
#                                                     bucket peak rate enforcement is performed.  If
#                                                     this value is less than DiffServInProfileRate
#                                                     attribute, then no token bucket traffic or peak
#                                                     rate enforcement is performed.
#         DiffServInProfileTokenBucket          (C):  In Kb, specifies the maximum burst size of
#                                                     a token bucket traffic conditioner
#                                                     that enforces the burst of traffic
#                                                     that is mapped to the corresponding
#                                                     policy action by a policy rule.  It
#                                                     is used together with the mean rate
#                                                     in generating tokens consumed by outgoing
#                                                     traffic.
#         DiffServInProfileMaxPacketSize        (C):  In Kb, specifies the maximum size of an
#                                                     IP packet being enforced by a token
#                                                     bucket traffic conditioner.  Note
#                                                     that due to blocking in S/390,
#                                                     multiple packets tend to be sent
#                                                     back to back and if maximum packet
#                                                     size is just big enough for one
#                                                     packet, violation of the peak rate
#                                                     (peak rate enforcement is based on
#                                                     the size of each individual packet)
#                                                     will result and violated packets
#                                                     will be sent with different TOS value
#                                                     or dropped as a consequence.  To
#                                                     accommodate this blocking, the value
#                                                     of this attribute should be set in
#                                                     multiples of the maximum packet size
#                                                     (e.g., equal to the token bucket size).
#         DiffServOutProfileTransmittedTOSByte  (O):  Specifies the TOS value to
#                                                     be used for out-of-profile traffic
#                                                     if the excess treatment specified is
#                                                     to send them as best effort.
#         DiffServExcessTrafficTreatment        (O):  Drop | BestEffort | Shape
#                                                     Specifies how a token bucket
#                                                     traffic conditioner should treat
#                                                     out-of-profile traffic.  Two options
#                                                     can be specified, either Drop or
#                                                     BestEffort.  If treatment is to send
#                                                     BestEffort, a different TOS value,
#                                                     if specified, will be used.  If
#                                                     treatment is to Drop, depending on
#                                                     whether the traffic is UDP or TCP
#                                                     different mechanisms will be used to
#                                                     handle Drop treatment:
#                                                     For UDP, traffic will actually be
#                                                      dropped.
#                                                     For TCP, Drop treatment is simulated
#                                                      in that TCP congestion window is
#                                                      cut (just as the case when a
#                                                      packet is dropped) immediately
#                                                      but the violated packet will be
#                                                      sent.  This is to avoid overhead
#                                                      associated with retransmission
#                                                      processing and also to reduce
#                                                      the traffic generated immediately
#                                                      without having to wait for a
#                                                      roundtrip time (i.e., standard TCP
#                                                      lost detection delay).  Also, TCP
#                                                      connections that are mapped to the
#                                                      same policy (i.e., aggregation)
#                                                      will share the throughput equally
#                                                      among them.
#         InboundScope                          (O):  Connection | Application
#                                                     Identifies the type of inbound QoS
#                                                     service that the corresponding policy
#                                                     action specifies.  It can be either
#                                                     Application (for a named application)
#                                                     or Connection (for general TCP
#                                                     connections).  Based on the inbound
#                                                     scope, a set of corresponding
#                                                     parameters can be applied for the
#                                                     traffic that is mapped to the policy
#                                                     action. This attribute is extendable
#                                                     to other applications.
#         AverageConnectionRate                 (O):  In Kbps, specifies the average number
#                                                     of new requests (connections)
#                                                     admitted per second.  If either the
#                                                     AverageConnectionRate or
#                                                     ConnectionBurstSize attribute is
#                                                     not in profile then the inbound
#                                                     connection will be <Drop>.
#         ConnectionBurstSize                   (O):  In Kb, specifies the maximum
#                                                     number of new requests (connections)
#                                                     accepted  concurrently.  If either
#                                                     the AverageConnectionRate or
#                                                     ConnectionBurstSize attribute is not
#                                                     in profile then the inbound connection
#                                                     will be <Drop>.
#         PeakConnectionRate                    (O):  In Kbps, specifies the peak rate of a
#                                                     token bucket traffic conditioner
#                                                     that enforces the peak rate of
#                                                     traffic that is mapped to the
#                                                     corresponding inbound policy action
#                                                     by a policy rule.  If the number
#                                                     of connections exceeds this rate, it
#                                                     will be considered as out-of-profile
#                                                     and therefore will be treated is if
#                                                     the DiffServExcessTrafficTreatment
#                                                     attribute was set to <Drop>.
#         AverageApplicationRate
#         AverageApplicationRequestRate         (O):  In Kbps, specifies the average number
#                                                     of new application requests admitted
#                                                     per second.  If either the
#                                                     AverageApplicationRequestRate
#                                                     or ApplicationRequestBurstSize
#                                                     attribute is not in profile then the
#                                                     inbound request will be <Drop>.
#         ApplicationBurstSize
#         ApplicationRequestBurstSize           (O):  In Kb, specifies the maximum number of
#                                                     new application requests accepted
#                                                     concurrently.  If either the
#                                                     AverageApplicationRequestRate or
#                                                     ApplicationRequestBurstSize
#                                                     attribute is not in profile then
#                                                     the inbound request will be <Drop>.
#         ApplicationPeakRate
#         ApplicationRequestPeakRate            (O):  In Kbps, specifies the peak rate of a
#                                                     token bucket traffic conditioner
#                                                     that enforces the peak rate of
#                                                     traffic that is mapped to the
#                                                     corresponding inbound policy
#                                                     action by a policy rule.  If
#                                                     the number of application
#                                                     requests exceeds this rate,
#                                                     it will be considered
#                                                     out-of-profile and the inbound
#                                                     application request will be
#                                                     <Drop>.
#         PrioritizedQueue                      (O):  1 | 2 | 3 | 4
#                                                     Specifies the order the queue of
#                                                     the server processes incoming
#                                                     connections.  If the incoming
#                                                     packet is within the profiles
#                                                     limits then each connection
#                                                     will be served by one of 3
#                                                     priorties.
#         InboundAcceptQueueID                  (O):  Identifies accept queue to use for inbound
#                                                      traffic. Accept queue is configured with
#                                                      an accept queue configuration policy.
#         FlowServiceType                       (O):  ControlledLoad | Guaranteed, default is
#                                                      ControlledLoad.  Guaranteed is considered
#                                                      greater than ControlledLoad.  Use this
#                                                      attribute to limit the type of RSVP service
#                                                      requested by RSVP applications.
#         MaxRatePerFlow                        (O):  In Kbps, default is system defined
#                                                      maximum.  Use this attribute to limit the
#                                                      mean rate requested by RSVP applications
#                                                      in the traffic specification (Tspec) or
#                                                      Guaranteed service Rspec.
#         MaxTokenBucketPerFlow                 (O):  In Kb, default is system defined maximum.
#                                                      Use this attribute to limit the token bucket
#                                                      depth requested by RSVP applications in the
#                                                      traffic specification (Tspec).
#         MaxFlows                              (O):  Default is non-specified (infinite).
#         SignalClient                          (O):  0 (no signalling) | 1 (signalling)
#         NumberOfAcceptQueues                  (O):  0 - 8. 0 requests the default accept queue
#                                                      configuration:
#                                                       ID          Weight
#                                                       High        40%
#                                                       Med         30%
#                                                       Low         20%
#                                                       BestEffort  10%
#                                                      Values 1 - 8 define a number of accept
#                                                      queues, whose IDs and weights are defined
#                                                      with AcceptQueueIDandWeight parameter.
#         AcceptQueueIDandWeight                (O):  2 values: Identifier and weight as a percentage.
#                                                      This parameter is used when NumberOfAcceptQueues
#                                                      is > 0, and must be repeated the number of times
#                                                      specified for NumberOfAcceptQueues.  The weights
#                                                      for all specified queues must add up to 100%.
#         DefaultAcceptQueueID                  (O):  ID of accept queue to use when provisioning
#                                                      policy does not specify InboundAcceptQueueID.
#                                                      Default is BestEffort if NumberOfAcceptQueues is
#                                                      0, or lowest weight queue specified with
#                                                      AcceptQueueIDandWeight.

# The following are a set of default policyAction definitions based
#   on the precedence field of the TOS byte in the IP header
#   (refer to RFC 791 for detail).   For network domains that support
#   Differentiated Services (DS) definition (RFC 2474), the outgoing
#   TOS (aka DS code points) value needs to be updated.
policyAction   networkcontrol
{
     policyScope    DataTraffic
     OutgoingTOS    11100000     # Precedence bits (first 3 bits)
}

policyAction   internetwork      # encapsulated network control
{
     policyScope    DataTraffic
     OutgoingTOS    11000000     #
}

policyAction   crit-realtime     # realtime data
{
     policyScope    DataTraffic
     OutgoingTOS    10100000     #
}

policyAction   interactive1
{
     policyScope    DataTraffic
     OutgoingTOS    10000000
}

policyAction   interactive2
{
     policyScope    DataTraffic
     OutgoingTOS    01100000
}

policyAction   batch1
{
     policyScope    DataTraffic
     OutgoingTOS    01000000
}

policyAction   batch2
{
     policyScope    DataTraffic
     OutgoingTOS    00100000
}


# policyRule statement
#   This statement specifies characteristics of IP packets, that are used
#   to match to a corresponding policyAction.  In other words, it
#   defines a set of IP packets that should receive a particular service.
#
#   statement format:
#         policyRule                               s  # Policy rule name.
#         {
#            PolicyRulePriority                    i  # Priority of this policy rule.
#            ForLoadDistribution                   p  # Is the rule intended for load
#                                                     #  distribution?
#            SourceAddressRange                a1 a2  # Source IP address range.
#            DestinationAddressRange           a1 a2  # Destination IP address range.
#            SourcePortRange                   i1 i2  # Source port range.
#            DestinationPortRange              i1 i2  # Destination port range.
#            ProtocolNumberRange               i1 i2  # Transport protocol id range to which
#                                                     #  this policy rule applies.
#            ApplicationName                       s  # Local application/job name.
#            ApplicationData                       s  # Application data, used for Web QoS.
#            ApplicationPriority                   i  # Application specified priority.
#            ServerDomainName                      s  # HTTP request URL domain name.
#            UserNameId                            s  # User name requesting service.
#            UserQoSGroup                          s  # User group requesting service.
#            InboundInterface                    a|s  # Incoming interface for which
#                                                     #  this policy rule applies.
#            OutboundInterface                   a|s  # Outgoing interface for which
#                                                     #  this policy rule applies.
#            IncomingTOS                           b  # IncomingTOS value/mask.
#            AcceptQueueLocalApplicationName       s  # Accept queue configuration
#                                                     # local application name.
#            AcceptQueueLocalIPAddressRange    a1 a2  # Accept queue configuration
#                                                     # local IP address range.
#            AcceptQueueLocalPortRange         i1 i2  # Accept queue configuration
#                                                     # local port range.
#            ConditionTimeRange                    s  # Overall time range.
#            MonthOfYearMask                       b  # Months of year that this
#                                                     #  policy rule is active.
#            DayOfMonthMask                        b  # Days of month that this
#                                                     #  policy rule is active.
#            DayOfWeekMask                         b  # Days in a week that this
#                                                     #  policy rule is active.
#            TimeOfDayRange                        s  # Time of each day during which
#                                                     #  policy rule is active.
#            PolicyActionReference                 s  # Name of an action which this policy
#                                                     #  rule uses.
#         }
#   where:
#         s                                     (R):  Is the name of this policy rule (up to 32
#                                                      characters, truncated if longer).
#         PolicyRulePriority                    (O):  Priority of a rule, it determines the order
#                                                      of rule evaluation relative to others.
#                                                      Default is for Pagent to assign a priority
#                                                      based on rule's specificity.  The maximum
#                                                      value is 2000000000.
#         ForLoadDistribution                   (O):  Set to TRUE if the rule is intended for a
#                                                      Sysplex Distributor (SD) distributing
#                                                      stack.  Use this for rules to be
#                                                      interpreted on the SD distributing
#                                                      stack.  Valid values are TRUE and FALSE.
#                                                      The default is FALSE.
#         SourceAddressRange                    (O):  From a1 to a2 where a2 >= a1, default is 0
#                                                      which is all inclusive.  a2 is optional.
#                                                      IPv4 or IPv6 addresses can be specified.
#         DestinationAddressRange               (O):  From a1 to a2 where a2 >= a1, default is 0
#                                                      which is all inclusive.  a2 is optional.
#                                                      IPv4 or IPv6 addresses can be specified.
#         SourcePortRange                       (O):  From i1 to i2 where i2 >= i1, default is 0
#                                                      which is all inclusive.  The maximum value
#                                                      is 65535.  i2 is optional.
#         DestinationPortRange                  (O):  From i1 to i2 where i2 >= i1, default is 0
#                                                      which is all inclusive.  The maximum value
#                                                      is 65535.  i2 is optional.
#         ProtocolNumberRange                   (O):  From i1 to i2 where i2 >= i1, default is 0
#                                                      which is all inclusive.  The maximum value
#                                                      is 255.  i2 is optional.
#         ApplicationName                       (O):  Specifies the name of the application that
#                                                      is executing in the S/390 (e.g.,
#                                                      also referred to as job name).
#                                                      Application name is used when
#                                                      a predefined port number is
#                                                      not known for the application
#                                                      (e.g., applications that use
#                                                      dynamically assigned port
#                                                      numbers).  Note that in S/390,
#                                                      application names are converted
#                                                      to upper case for comparison
#                                                      with job names.  '*' can be used
#                                                      as a wildcard.  The specified
#                                                      name is limited to 8 characters
#                                                      (longer names are silently truncated).
#         ApplicationData                       (O):  Attribute is used for content-based
#                                                      policy classification.  This means
#                                                      the policy allows policy condition
#                                                      to include application data to be
#                                                      included in the evaluation process.
#                                                      It enables an application to assign
#                                                      different types of QoS treatments
#                                                      for different transactions (or
#                                                      streams of data) within a session.
#                                                      In S/390, only web URI (Universal
#                                                      Resource Identifier) is supported
#                                                      as application data and only when the
#                                                      web application server activates
#                                                      Fast Response Cache Accelerator
#                                                      (FRCA) function.  This parameter
#                                                      is limited to 128 characters
#                                                     (longer data are silently truncated).
#         ApplicationPriority                   (O):  Attribute is used for content-based
#                                                      policy classification.  It allows
#                                                      an application to assign different
#                                                      priorities for different
#                                                      transactions (or streams of data)
#                                                      within a session.  Valid values
#                                                      are as follows:
#                                                      0 = Any application priority
#                                                           specified (default).
#                                                      1 = EXPEDITED, 2 = HIGH,
#                                                      3 = MEDIUM, 4 = LOW,
#                                                      5 = BESTEFFORT.
#         ServerDomainName                      (O):  Attribute contains the name of the
#                                                      server specified in an HTTP request
#                                                      URL.
#         UserNameId                            (O):  Specifies the identity of the user
#                                                      that is requesting a service which
#                                                      is to be assigned a QoS level.
#         UserQoSGroup                          (O):  Attribute contains the QoS group that
#                                                      is used to classify a user that is
#                                                      requesting a service.
#         InboundInterface                      (O):  Specifies a valid local interface.  Default
#                                                      is all inbound interfaces.  Either an IPv4
#                                                      address or an interface name can be specified.
#         OutboundInterface                     (O):  Specifies a valid local interface.  Default
#                                                      is all outbound interfaces.  Either an IPv4
#                                                      address or an interface name can be specified.
#                                                      NOTE: if both local inbound and outbound
#                                                      interfaces are specified, the corresponding
#                                                      rule won't be mapped to any traffic.  This
#                                                      is because S/390 implmentation of policy
#                                                      is as a server where traffic is destined to or
#                                                      originates from, not as a routing node where
#                                                      traffic enters one interface and departs on
#                                                      another.
#         IncomingTOS                           (O):  bbbbbbbb-n
#                                                      First 8 bits are incoming TOS value.  n is
#                                                      the number of significant bits in the TOS
#                                                      (1-8).
#         AcceptQueueLocalApplicationName       (O):  Local application name for accept queue
#                                                      configuration policy. This attribute cannot be
#                                                      specified with provisioning attributes, for
#                                                      example SourcePortRange. It can only be
#                                                      specified with other accept queue configuration
#                                                      attributes.
#         AcceptQueueLocalIPAddressRange        (O):  Local IP address range for accept queue
#                                                      configuration policy. This attribute cannot be
#                                                      specified with provisioning attributes, for
#                                                      example SourcePortRange. It can only be
#                                                      specified with other accept queue configuration
#                                                      attributes.
#         AcceptQueueLocalPortRange             (O):  Local port range for accept queue configuration
#                                                      policy. This attribute cannot be specified
#                                                      with provisioning attributes, for example
#                                                      SourcePortRange. It can only be specified with
#                                                      other accept queue configuration attributes.
#         ConditionTimeRange                    (O):  yyyymmddhhmmss:yyyymmddhhmmss
#                                                      Specifies the range of calendar dates
#                                                      on which the corresponding policy
#                                                      rule is valid.
#                                                       where yyyy is year, mm is month,
#                                                       dd is date, hh is hour,
#                                                       mm is minute and ss is second.
#                                                       Seconds are rounded to the nearest
#                                                       minute.  Default is always.  Out
#                                                       of bounds values are forced to be
#                                                       correct (for instance month 13
#                                                       becomes January of the following
#                                                       year).  Dates before the start of
#                                                       the Posix epoch
#                                                       (Jan/01/1970 00:00:00 UTC) are not
#                                                       valid.  The time is kept in the
#                                                       format of seconds since the epoch -
#                                                       this value wraps early in the
#                                                       year 2038, so times after that are
#                                                       not valid.
#         MonthOfYearMask                       (O):  A mask of 12 0's and 1's representing
#                                                      January to December.  Default is all year.
#         DayOfMonthMask                        (O):  A mask of 31 0's and 1's, default is
#                                                      all month.
#         DayOfWeekMask                         (O):  A mask of 7 0's and 1's representing Sunday
#                                                      through Saturday.  For example, 0111110
#                                                      represents weekdays.  Default is all week.
#         TimeOfDayRange                        (O):  A series of time intervals (up to 25),
#                                                      separated by a comma.  Time starts at 0
#                                                      which is right after midnight.  Only hour
#                                                      and minute are allowed to be specified.
#                                                      Default is 24 hours.
#                                                      Example: TimeOfDayRange 0-8:30, 17:30-24
#                                                      means this policy is only active after
#                                                      midnight to 8:30AM, and from 5:30PM to
#                                                      midnight.
#         PolicyActionReference                 (R):  Example: policyActionReference interactive
#                                                      Up to 4 instances of this statement
#                                                      can be specified (one name per attribute) to
#                                                      associate this policy rule with different
#                                                      actions.  For instance, a policy rule
#                                                      can reference two actions, one for RSVP
#                                                      and one for DataTraffic (DiffServ).

# The following are a set of default policy rules defined
#   for different traffic types including Enterprise Extender (EE),
#   based on port numbers from the host side (390 server).
#   This set is not exhaustive but only represents the majority of traffic
#   in a typical network.
policyRule          routed           # ROUTED traffic
{
     protocolNumberRange 17
     SourcePortRange    520          # ROUTED port
     policyActionReference  networkcontrol
}

policyRule          ospf             # OSPF link advertisement traffic
{
     protocolNumberRange 89          # OSPF protocol number
     policyActionReference  networkcontrol
}

policyRule          ftpd            # FTP traffic
{
     protocolNumberRange  6
     SourcePortRange    20 21       # Both FTP control and data ports
     policyActionReference  batch1
}

policyRule          telnetd         # telnet traffic
{
     protocolNumberRange  6
     SourcePortRange    23
     policyActionReference  interactive1
}

policyRule          web-httpd       # web traffic
{
     protocolNumberRange  6
     SourcePortRange    80
     policyActionReference  interactive2
}

policyRule          dns-udp         # domain name server udp traffic
{
     protocolNumberRange 17
     SourcePortRange    42
     policyActionReference  interactive1
}

policyRule          dns-tcp         # domain name server tcp traffic
{
     protocolNumberRange  6
     SourcePortRange    42
     policyActionReference  interactive1
}

policyRule          ntp             # NTP traffic
{
     protocolNumberRange  17
     SourcePortRange    123
     policyActionReference  crit-realtime
}

policyRule          EE-xid
{
     protocolNumberRange 17
     SourcePortRange    12000
     policyActionReference  internetwork
}

policyRule          EE-network
{
     protocolNumberRange 17
     SourcePortRange    12001
     policyActionReference  internetwork
}

policyRule          EE-highpri
{
     protocolNumberRange 17
     SourcePortRange    12002
     policyActionReference  interactive1
}

policyRule          EE-medpri
{
     protocolNumberRange 17
     SourcePortRange    12003
     policyActionReference  batch1
}

policyRule          EE-lowpri
{
     protocolNumberRange 17
     SourcePortRange    12004
     policyActionReference  batch2
}

TcpImage TCPIP /etc/pagent/pagent_TTLS.conf FLUSH NOPURGE 2000000000
# The following is a sample policy for enforcing Differentiated Services
#   parameters that describe a token bucket mechanism.  The action
#   establishes a token bucket traffic conditioner with a mean rate of
#   512 kilobits per second and a burst size of 4 kilobytes.  Any traffic
#   that exceeds these specifications will be sent as best effort, with
#   an accompanying TOS byte of '00000000'.  Note that this is just an
#   example: exact specifications depend on the characteristics of the
#   sending application and the underlying network.
#
# PolicyRule                               DiffServ_Rule1
#  {
#     DestinationAddressRange               211.40.100.0-211.40.100.255
#     SourcePortRange                       20-21
#     PolicyActionReference                 DiffServ_Action1
#     DayOfWeekMask                         0111110
#  }
#
# PolicyAction                             DiffServ_Action1
#  {
#     PolicyScope                           DataTraffic
#     OutgoingTOS                           01000000
#     DiffServInProfileRate                 512       # 512 Kbps
#     DiffServInProfileTokenBucket          64        # 64  Kbits
#     DiffServInProfilePeakRate             1500      # 1.5 Mbps
#     DiffServInProfileMaxPacketSize        120       # 120 Kbits
#     DiffServOutProfileTransmittedTOSByte  00000000
#     DiffServExcessTrafficTreatment        BestEffort
#  }
